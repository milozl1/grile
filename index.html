        <div class="tdesc">32 întrebări (8 A · 8 BD · 8 J · 8 S)</div>
      </div>
      ${done ? '<div class="check done">✓</div>' : '<div class="check"></div>'}
    `;
    div.onclick = () => startTest(i);
    list.appendChild(div);
  });
}

function renderSectionPicker(app){
  app.innerHTML = `
    <div class="top-bar">
      <button class="btn-icon" id="backBtn">‹</button>
      <h2>Antrenament</h2>
      <div style="width:44px"></div>
    </div>
    <p class="sub">Alege o secțiune și numărul de întrebări cu care vrei să exersezi.</p>
    <div class="card">
      <p class="group-title" style="font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);margin-bottom:14px;">Secțiunea</p>
      <div class="sec-grid" id="secGrid"></div>
      <div class="range-row">
        <label for="qCount">Întrebări:</label>
        <input type="range" id="qCount" min="4" max="50" step="2" value="${state.sectionCount}">
        <span class="rangeval" id="qCountVal">${state.sectionCount}</span>
      </div>
      <button class="btn-primary" id="startSectionBtn">Începe antrenamentul</button>
    </div>
  `;
  app.querySelector('#backBtn').onclick = goHome;

  const grid = app.querySelector('#secGrid');
  SECTIONS.forEach(s => {
    const div = document.createElement('div');
    div.className = 'sec-card' + (state.sectionCode === s.code ? ' active' : '');
    div.innerHTML = `<div class="sec-code">${s.code}</div><div class="sec-name">${s.name.split('.')[0]}</div>`;
    div.onclick = () => {
      state.sectionCode = s.code;
      renderSectionPicker(app);
    };
    grid.appendChild(div);
  });

  if(!state.sectionCode) state.sectionCode = SECTIONS[0].code;

  const range = app.querySelector('#qCount');
  const rangeVal = app.querySelector('#qCountVal');
  range.oninput = () => {
    state.sectionCount = parseInt(range.value);
    rangeVal.textContent = state.sectionCount;
  };

  app.querySelector('#startSectionBtn').onclick = () => {
    if(!state.sectionCode) return;
    startSectionPractice();
  };
}

function startSectionPractice(){
  const questionsInSection = QUESTIONS.filter(q => q.sec === state.sectionCode);
  const shuffled = shuffle(questionsInSection);
  const count = Math.min(state.sectionCount, shuffled.length);
  state.quiz = shuffled.slice(0, count);
  state.quizMode = 'section';
  state.sectionCode = state.sectionCode;
  state.current = 0;
  state.answers = new Array(state.quiz.length).fill(null);
  state.currentSelection = [];
  state.locked = false;
  state.timerStarted = Date.now();
  state.screen = 'quiz';
  render();
}

function startTest(idx){
  state.testIndex = idx;
  state.quiz = TEST_DEFS[idx].map(id => QMAP[id]);
  state.quizMode = 'test';
  state.current = 0;
  state.answers = new Array(state.quiz.length).fill(null);
  state.currentSelection = [];
  state.locked = false;
  state.timerStarted = Date.now();
  if(state.timerInterval){clearInterval(state.timerInterval);state.timerInterval=null}
  state.screen = 'quiz';
  render();
}

// ---- Quiz ----
function renderQuiz(app){
  const q = state.quiz[state.current];
  if(!q) return;
  const isMulti = q.ans.length > 1;
  const answered = state.answers[state.current];
  const scoreSoFar = state.answers.filter(a=>a&&a.correct).length;
  const answeredCount = state.answers.filter(a=>a).length;
  const pct = Math.round((state.current/state.quiz.length)*100);
  const totalQ = state.quiz.length;
  const elapsed = state.timerStarted ? Date.now() - state.timerStarted : 0;

  let label = state.quizMode === 'test' ? `Test ${state.testIndex+1}` : state.sectionCode;

  app.innerHTML = `
    <div class="top-bar">
      <button class="btn-icon" id="backBtn">✕</button>
      <h2>${label}</h2>
      <div style="width:44px"></div>
    </div>
    <div class="palette" id="palette"></div>
    <div class="quiz-top">
      <span class="qmeta">${state.current+1}/${totalQ} · ${q.sec}</span>
      <span class="qscore">${scoreSoFar}/${answeredCount}</span>
    </div>
    <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="timer-bar" id="timer">${formatTime(elapsed)}</div>
    <div class="card swipe-zone" id="quizCard">
      <p class="qid">${q.id}</p>
      <p class="qtext">${esc(q.text)}</p>
      ${isMulti ? '<p class="multi-hint">Selectează toate variantele corecte</p>' : ''}
      <div class="opts" id="opts"></div>
      <div id="feedbackArea"></div>
      <div class="actions" id="actionsArea"></div>
    </div>
  `;

  // Timer
  if(state.timerInterval) clearInterval(state.timerInterval);
  if(!answered || state.current < state.quiz.length-1){
    state.timerInterval = setInterval(()=>{
      const el = document.getElementById('timer');
      if(el) el.textContent = formatTime(Date.now()-state.timerStarted);
    }, 1000);
  }

  // Palette
  const palette = app.querySelector('#palette');
  state.answers.forEach((a, i)=>{
    const dot = document.createElement('div');
    let cls = 'palette-dot';
    if(i === state.current) cls += ' current';
    if(a){
      cls += ' answered';
      cls += a.correct ? ' correct' : ' wrong';
    }
    dot.className = cls;
    dot.title = `Întrebarea ${i+1}`;
    palette.appendChild(dot);
  });

  // Options
  const opts = app.querySelector('#opts');
  Object.keys(q.opts).forEach(letter=>{
    const div = document.createElement('div');
    let cls = 'opt';
    const isSelected = (answered ? answered.selected : state.currentSelection).includes(letter);
    if(isSelected) cls += ' selected';
    if(answered){
      cls += ' locked';
      const isCorrectLetter = q.ans.includes(letter);
      if(isCorrectLetter && isSelected) cls += ' correct';
      else if(!isCorrectLetter && isSelected) cls += ' incorrect';
      else if(isCorrectLetter && !isSelected) cls += ' missed';
    }
    div.className = cls;
    div.innerHTML = `<div class="bubble">${letter.toUpperCase()}</div><div class="opt-text">${esc(q.opts[letter])}</div>`;
    if(!answered){
      div.onclick = () => toggleOption(letter);
    }
    opts.appendChild(div);
  });

  // Feedback & actions
  const feedbackArea = app.querySelector('#feedbackArea');
  const actionsArea = app.querySelector('#actionsArea');
  if(answered){
    const fb = document.createElement('div');
    fb.className = 'feedback ' + (answered.correct ? 'ok' : 'bad');
    fb.innerText = answered.correct
      ? '✓ Corect.'
      : '✗ Greșit. Răspuns corect: ' + q.ans.join(', ').toUpperCase() + '.';
    if(state.instantFeedback) feedbackArea.appendChild(fb);

    const nextBtn = document.createElement('button');
    nextBtn.className = 'btn-primary';
    nextBtn.innerText = state.current < state.quiz.length-1 ? 'Următoarea →' : 'Vezi rezultatul';
    nextBtn.onclick = nextQuestion;
    actionsArea.appendChild(nextBtn);
  } else if(isMulti){
    const submitBtn = document.createElement('button');
    submitBtn.className = 'btn-primary';
    submitBtn.innerText = 'Verifică';
    submitBtn.disabled = state.currentSelection.length === 0;
    submitBtn.onclick = submitAnswer;
    actionsArea.appendChild(submitBtn);
  }

  // Back = quit
  app.querySelector('#backBtn').onclick = ()=>{
    if(state.timerInterval) clearInterval(state.timerInterval);
    state.timerInterval = null;
    if(confirm('Renunți la acest test?')){
      goHome();
    }
  };

  // Swipe
  setupSwipe(app.querySelector('#quizCard'));
}

function setupSwipe(el){
  let startX = 0, startY = 0;
  el.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
  }, {passive: true});
  el.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    if(Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 60){
      if(dx < 0) goNext();
      else goPrev();
    }
  }, {passive: true});
}

function goNext(){
  if(state.current < state.quiz.length-1 && state.answers[state.current]){
    state.current++;
    state.currentSelection = [];
    state.locked = false;
    render();
  }
}

function goPrev(){
  if(state.current > 0){
    state.current--;
    state.currentSelection = [];
    state.locked = false;
    render();
  }
}

function toggleOption(letter){
  if(state.locked) return;
  const q = state.quiz[state.current];
  const isMulti = q.ans.length > 1;
  if(isMulti){
    const idx = state.currentSelection.indexOf(letter);
    if(idx >= 0) state.currentSelection.splice(idx,1);
    else state.currentSelection.push(letter);
  } else {
    state.currentSelection = [letter];
    if(state.instantFeedback){
      submitAnswer();
      return;
    }
  }
  render();
}

function submitAnswer(){
  if(state.currentSelection.length === 0) return;
  const q = state.quiz[state.current];
  const correct = arraysEqualAsSets(state.currentSelection, q.ans);
  state.answers[state.current] = {selected: state.currentSelection.slice(), correct};
  state.locked = true;
  if(state.timerInterval) clearInterval(state.timerInterval);
  state.timerInterval = null;
  render();
}

function nextQuestion(){
  if(state.current < state.quiz.length-1){
    state.current++;
    state.currentSelection = [];
    state.locked = false;
    render();
  } else {
    finishQuiz();
  }
}

function finishQuiz(){
  if(state.timerInterval){clearInterval(state.timerInterval);state.timerInterval=null}
  const elapsed = state.timerStarted ? Date.now() - state.timerStarted : 0;
  const total = state.quiz.length;
  const correct = state.answers.filter(a=>a&&a.correct).length;

  const entry = {
    type: state.quizMode,
    label: state.quizMode === 'test' ? `Test ${state.testIndex+1}` : state.sectionCode,
    total,
    correct,
    elapsed,
    date: Date.now()
  };

  if(state.quizMode === 'test'){
    state.completedTests.add(state.testIndex);
    state.history.push(entry);
  } else {
    if(!state.sectionAttempts[state.sectionCode]) state.sectionAttempts[state.sectionCode] = [];
    state.sectionAttempts[state.sectionCode].push(entry);
  }

  savePersisted();
  state.screen = 'results';
  render();
}

function retryQuiz(){
  state.current = 0;
  state.answers = new Array(state.quiz.length).fill(null);
  state.currentSelection = [];
  state.locked = false;
  state.timerStarted = Date.now();
  state.screen = 'quiz';
  render();
}

// ---- Results ----
function renderResults(app){
  const total = state.quiz.length;
  const correct = state.answers.filter(a=>a&&a.correct).length;
  const pct = Math.round((correct/total)*100);

  const bySec = {};
  state.quiz.forEach((q,i)=>{
    if(!bySec[q.sec]) bySec[q.sec] = {correct:0,total:0};
    bySec[q.sec].total++;
    if(state.answers[i]&&state.answers[i].correct) bySec[q.sec].correct++;
  });

  let label = state.quizMode === 'test' ? `Test ${state.testIndex+1}` : `Secțiunea ${state.sectionCode}`;

  app.innerHTML = `
    <div class="top-bar">
      <button class="btn-icon" id="homeBtn">‹</button>
      <h2>Rezultat</h2>
      <div style="width:44px"></div>
    </div>
    <div class="card">
      <p class="eyebrow">${label}</p>
      <div class="score-hero">
        <div class="score-num">${correct}/${total}</div>
        <div class="score-label">${pct}% răspunsuri corecte</div>
      </div>
      <div class="breakdown" id="breakdown"></div>
      <button class="btn-primary" id="retryBtn">Reia</button>
      <button class="btn-secondary" id="homeBtn2" style="margin-top:10px">Înapoi la meniu</button>
    </div>
    <div class="card" style="margin-top:16px" id="reviewCard"></div>
  `;

  const breakdown = app.querySelector('#breakdown');
  Object.keys(bySec).forEach(sec => {
    const b = bySec[sec];
    const div = document.createElement('div');
    div.className = 'bd-item';
    div.innerHTML = `<div class="bname">${sec}</div><div class="bscore">${b.correct}/${b.total}</div>`;
    breakdown.appendChild(div);
  });

  app.querySelector('#retryBtn').onclick = retryQuiz;
  app.querySelector('#homeBtn').onclick = goHome;
  app.querySelector('#homeBtn2').onclick = goHome;

  const reviewCard = app.querySelector('#reviewCard');
  const wrongOnes = state.quiz.map((q,i)=>({q,a:state.answers[i]})).filter(x=>!x.a||!x.a.correct);
  if(wrongOnes.length === 0){
    reviewCard.innerHTML = '<p class="group-title" style="font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);margin-bottom:8px;">Recapitulare</p><p style="font-size:14px;color:var(--ink-soft)">Toate răspunsurile au fost corecte! 🎉</p>';
  } else {
    let html = '<p class="group-title" style="font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);margin-bottom:8px;">De revizuit ('+wrongOnes.length+')</p>';
    wrongOnes.forEach(x=>{
      const q = x.q;
      const selected = x.a ? x.a.selected.join(', ').toUpperCase() : '—';
      html += '<div class="review-item">' +
        '<p class="qid">'+q.id+'</p>' +
        '<p class="review-q">'+esc(q.text)+'</p>' +
        '<p class="review-line wrong-ans">Răspunsul tău: '+selected+'</p>' +
        '<p class="review-line correct-ans">Corect: '+q.ans.join(', ').toUpperCase()+' — '+q.ans.map(l=>esc(q.opts[l])).join(' ')+'</p>' +
      '</div>';
    });
    reviewCard.innerHTML = html;
  }
}

// ---- Stats ----
function renderStats(app){
  const allAttempts = [...state.history];
  for(const k in state.sectionAttempts){
    state.sectionAttempts[k].forEach(a => allAttempts.push(a));
  }

  const totalQ = allAttempts.reduce((s,a)=>s+a.total, 0);
  const correctQ = allAttempts.reduce((s,a)=>s+a.correct, 0);
  const overallPct = totalQ > 0 ? Math.round((correctQ/totalQ)*100) : 0;
  const totalTests = allAttempts.length;

  // Per section stats
  const secStats = {};
  SECTIONS.forEach(s => secStats[s.code] = {correct:0,total:0});
  // Also consider individual test results broken by section if we track that... 
  // For simplicity, we just track overall per-section from history
  // Actually we need mode-detailed data. Let's compute from sectionAttempts and from completed tests
  // For completed tests, we don't have per-section data in history, but we can approximate
  // Let's use sectionAttempts data and also derive from test history if available
  // For simplicity, we'll just show overall and let sectionAttempts provide per-section detail

  const recent = allAttempts.slice(-10).reverse();

  app.innerHTML = `
    <div class="top-bar">
      <button class="btn-icon" id="backBtn">‹</button>
      <h2>Statistici</h2>
      <div style="width:44px"></div>
    </div>
    ${allAttempts.length === 0 ? '<div class="empty-state">Încă nu ai completat niciun test. Începe un test pentru a vedea statistici!</div>' : `
    <div class="stats-grid">
      <div class="stat-card animate"><div class="stat-num">${totalTests}</div><div class="stat-label">Teste date</div></div>
      <div class="stat-card animate"><div class="stat-num">${overallPct}%</div><div class="stat-label">Procentaj</div></div>
      <div class="stat-card animate"><div class="stat-num">${totalQ}</div><div class="stat-label">Întrebări</div></div>
      <div class="stat-card animate"><div class="stat-num">${correctQ}/${totalQ}</div><div class="stat-label">Corecte</div></div>
    </div>
    <div class="card">
      <p class="group-title" style="font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);margin-bottom:14px;">Performanță pe secțiuni</p>
      <div class="section-stats" id="secStats"></div>
    </div>
    ${recent.length > 0 ? `
    <div class="card" style="margin-top:16px">
      <p class="group-title" style="font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);margin-bottom:8px;">Istoric recent</p>
      <div id="historyList">${recent.map(h => `
        <div class="history-item">
          <span class="hname">${h.label}</span>
          <span class="hscore">${h.correct}/${h.total} (${Math.round((h.correct/h.total)*100)}%)</span>
        </div>
      `).join('')}</div>
    </div>` : ''}
    `}
  `;

  app.querySelector('#backBtn').onclick = goHome;

  if(allAttempts.length > 0){
    const secStatsEl = app.querySelector('#secStats');
    // Compute per-section from sectionAttempts
    const sData = {};
    SECTIONS.forEach(s => sData[s.code] = {correct:0,total:0});
    for(const k in state.sectionAttempts){
      if(sData[k]){
        state.sectionAttempts[k].forEach(a => {
          sData[k].correct += a.correct;
          sData[k].total += a.total;
        });
      }
    }
    // Also estimate from completed tests (assume 8 questions per section per test)
    state.history.forEach(h => {
      if(h.type === 'test'){
        // We don't have per-section breakdown for tests, skip
      }
    });

    SECTIONS.forEach(s => {
      const d = sData[s.code];
      const pct = d.total > 0 ? Math.round((d.correct/d.total)*100) : 0;
      if(d.total > 0){
        const div = document.createElement('div');
        div.className = 'section-stat';
        div.innerHTML = `
          <span class="sname">${s.code}</span>
          <div class="sbar"><div class="sbar-fill" style="width:${pct}%"></div></div>
          <span class="spct">${d.correct}/${d.total}</span>
        `;
        secStatsEl.appendChild(div);
      }
    });

    if(secStatsEl.children.length === 0){
      secStatsEl.innerHTML = '<div style="font-size:13px;color:var(--ink-soft)">Completează un antrenament pe secțiuni pentru a vedea statistici detaliate.</div>';
    }
  }
}

// ---- Init ----
render();
</script>
</body>
</html>
