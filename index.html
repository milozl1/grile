<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#F2EEE2" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0F1421" media="(prefers-color-scheme: dark)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Teste grilă — Licență 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --paper:#F2EEE2;
  --paper-card:#FBF9F3;
  --ink:#1E2A44;
  --ink-soft:#4C5670;
  --ink-faint:#8B93A8;
  --line:#D8D2C0;
  --line-light:#E6E0D0;
  --gold:#B8912B;
  --gold-soft:#EFE2BC;
  --gold-bright:#D4A843;
  --green:#2E6B4E;
  --green-bg:#E1EEE4;
  --green-bright:#3D8B67;
  --red:#AC3B2E;
  --red-bg:#F5E1DD;
  --red-bright:#D64F3E;
  --blue:#3A5F8A;
  --blue-bg:#E0E8F2;
  --mono:'IBM Plex Mono',monospace;
  --serif:'Source Serif 4',Georgia,serif;
  --sans:'Inter',-apple-system,sans-serif;
  --radius-sm:8px;
  --radius:12px;
  --radius-lg:16px;
  --shadow-sm:0 1px 2px rgba(0,0,0,.04);
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-lg:0 4px 16px rgba(0,0,0,.08);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --safe-top:env(safe-area-inset-top,0px);
  --font-scale:1;
}
[data-theme=dark]{
  --paper:#0F1421;
  --paper-card:#171E32;
  --ink:#E0DDD2;
  --ink-soft:#8B94AD;
  --ink-faint:#5A637A;
  --line:#262F4A;
  --line-light:#1E2640;
  --gold:#D4A843;
  --gold-soft:#2A2516;
  --gold-bright:#E6BC54;
  --green:#4CAF7A;
  --green-bg:#142A1E;
  --green-bright:#66D499;
  --red:#E06050;
  --red-bg:#2A1815;
  --red-bright:#F07060;
  --blue:#5A8FC9;
  --blue-bg:#182438;
  --shadow:none;
  --shadow-lg:0 4px 24px rgba(0,0,0,.3);
}
html{height:100%;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
body{
  margin:0;min-height:100%;min-height:100dvh;background:var(--paper);color:var(--ink);
  font-family:var(--sans);-webkit-font-smoothing:antialiased;
  transition:background .3s ease,color .3s ease;
  overflow-x:hidden;
}
#app{
  max-width:760px;margin:0 auto;padding:calc(16px + var(--safe-top)) 16px calc(24px + var(--safe-bottom));
  animation:pageIn .25s ease;
}
@keyframes pageIn{from{opacity:0;transform:translateY(12px);filter:blur(2px)}to{opacity:1;transform:translateY(0);filter:blur(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{transform:scale(.96);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes ripple{to{transform:scale(4);opacity:0}}
@keyframes counting{0%{opacity:.4}100%{opacity:1}}
@keyframes confetti-fall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
.animate{animation:slideUp .3s cubic-bezier(.22,1,.36,1) forwards;opacity:0}
.animate:nth-child(1){animation-delay:0s}
.animate:nth-child(2){animation-delay:.07s}
.animate:nth-child(3){animation-delay:.14s}
.animate:nth-child(4){animation-delay:.21s}
.animate:nth-child(5){animation-delay:.28s}
.animate:nth-child(6){animation-delay:.35s}
.animate:nth-child(7){animation-delay:.42s}
.animate:nth-child(8){animation-delay:.49s}

/* ------ Top Bar ------ */
.top-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:4px 0 20px;gap:8px;
}
.top-bar .tb-start{display:flex;align-items:center;gap:8px;min-width:0}
.top-bar .tb-end{display:flex;align-items:center;gap:8px;flex-shrink:0}
.top-bar .tb-label{font-family:var(--serif);font-size:19px;font-weight:600;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn-icon{
  width:44px;height:44px;display:flex;align-items:center;justify-content:center;
  border:none;background:var(--paper-card);color:var(--ink-soft);font-size:20px;
  border-radius:50%;cursor:pointer;transition:all .15s ease;border:1px solid var(--line);
  flex-shrink:0;position:relative;overflow:hidden;
}
.btn-icon:hover,.btn-icon:focus-visible{border-color:var(--ink-soft);color:var(--ink);background:var(--paper)}
.btn-icon:active{transform:scale(.93)}

/* ------ Cards ------ */
.card{
  background:var(--paper-card);border:1px solid var(--line);border-radius:var(--radius-lg);
  padding:24px;position:relative;transition:background .3s ease,border-color .3s ease;
  animation:scaleIn .25s ease;
}
.card-header{
  font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--ink-faint);margin-bottom:14px;
}
.eyebrow{
  font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;
  color:var(--gold);margin:0 0 6px;
}
h1{
  font-family:var(--serif);font-weight:700;font-size:30px;margin:0 0 6px;color:var(--ink);
  line-height:1.15;letter-spacing:-.01em;
}
h2{
  font-family:var(--serif);font-weight:600;font-size:20px;color:var(--ink);
}
.sub{
  color:var(--ink-soft);font-size:14.5px;line-height:1.55;margin:0 0 24px;max-width:56ch;
}

/* ------ Home Menu ------ */
.home-menu{display:flex;flex-direction:column;gap:14px}
.menu-btn{
  display:flex;align-items:center;gap:18px;
  padding:20px 22px;border:1.5px solid var(--line);border-radius:var(--radius-lg);
  background:var(--paper-card);cursor:pointer;transition:all .18s ease;text-align:left;
  width:100%;font-family:var(--sans);position:relative;overflow:hidden;
}
.menu-btn:hover,.menu-btn:focus-visible{border-color:var(--gold);transform:translateX(4px)}
.menu-btn:active{transform:scale(.99)}
.menu-btn .icon{
  width:48px;height:48px;border-radius:14px;display:flex;align-items:center;
  justify-content:center;font-size:22px;flex-shrink:0;
  background:var(--gold-soft);color:var(--gold);transition:background .3s ease;
}
.menu-btn .mtitle{font-weight:600;font-size:16px;color:var(--ink);margin-bottom:3px}
.menu-btn .mdesc{font-size:13px;color:var(--ink-soft);line-height:1.4}
.menu-btn .mbadge{
  display:inline-block;margin-left:8px;padding:2px 8px;border-radius:20px;
  font-family:var(--mono);font-size:9px;font-weight:600;text-transform:uppercase;
  letter-spacing:.04em;background:var(--gold-soft);color:var(--gold);
}

/* ------ Toggle ------ */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-top:1px solid var(--line);margin-top:6px}
.toggle-row .ttitle{font-size:14px;font-weight:500}
.toggle-row .tdesc{font-size:12px;color:var(--ink-soft);margin-top:2px}
.switch{position:relative;width:46px;height:26px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0}
.slider-el{
  position:absolute;inset:0;background:var(--line);border-radius:26px;
  cursor:pointer;transition:background .25s ease;
}
.slider-el::before{
  content:"";position:absolute;width:20px;height:20px;left:3px;top:3px;
  background:#fff;border-radius:50%;transition:transform .25s cubic-bezier(.34,1.56,.64,1);
}
input:checked+.slider-el{background:var(--gold)}
input:checked+.slider-el::before{transform:translateX(20px)}

/* ------ Section cards ------ */
.sec-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.sec-card{
  padding:18px;border:1.5px solid var(--line);border-radius:var(--radius-lg);
  cursor:pointer;transition:all .15s ease;text-align:center;background:var(--paper-card);position:relative;
}
.sec-card:active{transform:scale(.97)}
.sec-card:hover{border-color:var(--ink-faint)}
.sec-card.active{border-color:var(--gold);background:var(--gold-soft)}
.sec-card .sec-code{font-family:var(--mono);font-weight:600;font-size:22px;color:var(--gold)}
.sec-card .sec-name{font-size:10.5px;color:var(--ink-soft);margin-top:4px;line-height:1.3}
.range-row{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.range-row label{font-size:13px;font-weight:500;white-space:nowrap;color:var(--ink-soft)}
input[type=range]{flex:1;accent-color:var(--gold);height:6px;cursor:pointer;-webkit-appearance:none;appearance:none;background:var(--line);border-radius:3px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--gold);cursor:pointer;border:3px solid var(--paper-card);box-shadow:var(--shadow)}
.rangeval{font-family:var(--mono);font-weight:600;font-size:15px;min-width:38px;text-align:right;color:var(--ink)}

/* ------ Test list ------ */
.test-list{display:flex;flex-direction:column;gap:10px}
.test-opt{
  display:flex;align-items:center;gap:16px;
  padding:18px;border:1.5px solid var(--line);border-radius:var(--radius-lg);
  cursor:pointer;transition:all .15s ease;background:var(--paper-card);position:relative;
}
.test-opt:active{transform:scale(.99)}
.test-opt:hover{border-color:var(--ink-faint)}
.test-opt .tnum{font-family:var(--mono);font-weight:600;font-size:15px;color:var(--gold);min-width:34px}
.test-opt .tinfo .ttitle{font-weight:600;font-size:14px;color:var(--ink)}
.test-opt .tinfo .tdesc{font-size:12px;color:var(--ink-soft);margin-top:3px}
.test-opt .check{margin-left:auto;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.test-opt .check.done{background:var(--green);color:#fff;font-size:12px}

/* ------ Buttons ------ */
button{font-family:var(--sans);-webkit-tap-highlight-color:transparent;border:none;cursor:pointer}
.btn-primary{
  width:100%;padding:16px;background:var(--ink);color:var(--paper-card);
  border-radius:var(--radius);font-size:15px;font-weight:600;
  cursor:pointer;transition:all .15s ease;position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-primary:active{transform:scale(.98)}
.btn-primary:hover{opacity:.9}
.btn-primary:disabled{opacity:.35;cursor:default;transform:none}
.btn-primary.gold{background:var(--gold);color:#fff}
.btn-primary.gold:hover{background:var(--gold-bright)}
.btn-primary.red{background:var(--red);color:#fff}
.btn-primary.red:hover{background:var(--red-bright)}
.btn-secondary{
  width:100%;padding:14px;background:transparent;color:var(--ink);
  border:1.5px solid var(--line);border-radius:var(--radius);font-size:14px;
  font-weight:500;cursor:pointer;transition:all .15s ease;display:flex;
  align-items:center;justify-content:center;gap:8px;
}
.btn-secondary:active{transform:scale(.98)}
.btn-secondary:hover{border-color:var(--ink-soft)}
.btn-small{
  padding:8px 16px;border:1.5px solid var(--line);border-radius:var(--radius-sm);
  background:transparent;color:var(--ink-soft);font-size:12px;font-weight:500;
  cursor:pointer;transition:all .15s ease;font-family:var(--sans);
}
.btn-small:hover{border-color:var(--ink-soft);color:var(--ink)}

/* ------ Quiz Top ------ */
.quiz-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:10px}
.quiz-top .qmeta{font-family:var(--mono);font-size:11px;color:var(--ink-soft);display:flex;align-items:center;gap:6px}
.quiz-top .qscore{font-family:var(--mono);font-size:11px;color:var(--ink-soft)}
.progress-track{height:4px;background:var(--line);border-radius:2px;overflow:hidden;margin-bottom:16px}
.progress-fill{height:100%;background:var(--gold);transition:width .4s cubic-bezier(.22,1,.36,1);border-radius:2px}
.progress-fill.exam{background:linear-gradient(90deg,var(--gold),var(--gold-bright))}

/* ------ Timer ------ */
.timer-bar{
  display:flex;align-items:center;justify-content:center;gap:7px;
  font-family:var(--mono);font-size:14px;font-weight:500;color:var(--ink-soft);
  padding:4px 0 14px;letter-spacing:.02em;
}
.timer-bar .timer-icon{font-size:16px}
.timer-bar.warning{color:var(--red);animation:counting .6s ease infinite alternate}
.timer-bar.critical{color:var(--red-bright);animation:counting .3s ease infinite alternate}

/* ------ Palette ------ */
.palette-wrap{overflow-x:auto;margin-bottom:16px;padding:2px 0;-webkit-overflow-scrolling:touch}
.palette-wrap::-webkit-scrollbar{height:0}
.palette{display:flex;gap:5px;padding:0 2px;min-width:min-content}
.palette-dot{
  width:30px;height:30px;border-radius:var(--radius-sm);border:1.5px solid var(--line);
  flex-shrink:0;cursor:pointer;transition:all .15s ease;position:relative;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:10px;font-weight:500;color:var(--ink-faint);
  background:transparent;
}
.palette-dot:active{transform:scale(.9)}
.palette-dot.current{border-color:var(--gold);color:var(--gold);font-weight:600}
.palette-dot.saved{border-color:var(--ink-soft);background:var(--ink-soft);color:#fff}
.palette-dot.answered{border-color:var(--ink-soft);background:var(--ink-soft);color:#fff}
.palette-dot.answered.wrong{background:var(--red);border-color:var(--red);color:#fff}
.palette-dot.answered.correct{background:var(--green);border-color:var(--green);color:#fff}
.palette-dot.exam-saved{border-color:var(--gold);background:var(--gold-soft);color:var(--gold);font-weight:600}

/* ------ Options ------ */
.qid{font-family:var(--mono);font-size:11px;color:var(--gold);margin-bottom:10px;letter-spacing:.04em;font-weight:500}
.qtext{
  font-family:var(--serif);font-size:17px;line-height:1.55;font-weight:500;
  white-space:pre-wrap;margin:0 0 22px;color:var(--ink);
}
.qtext code,.code-block{
  font-family:var(--mono);font-size:13px;background:var(--line);
  display:block;padding:10px 14px;border-radius:var(--radius-sm);margin:12px 0;white-space:pre-wrap;
  border:1px solid var(--line-light);
}
.multi-hint{font-size:12px;color:var(--ink-soft);font-style:italic;margin:-14px 0 16px}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{
  display:flex;align-items:flex-start;gap:14px;
  padding:14px 16px;border:1.5px solid var(--line);border-radius:var(--radius);
  cursor:pointer;background:var(--paper-card);transition:all .15s ease;
  min-height:54px;position:relative;overflow:hidden;
}
.opt:active:not(.locked){transform:scale(.99)}
.opt:hover:not(.locked):not(.disabled){border-color:var(--ink-faint)}
.opt .bubble{
  flex-shrink:0;width:28px;height:28px;border-radius:50%;
  border:1.5px solid var(--ink-faint);display:flex;align-items:center;
  justify-content:center;font-family:var(--mono);font-size:13px;font-weight:600;
  color:var(--ink-faint);transition:all .18s ease;margin-top:2px;
}
.opt.selected .bubble{background:var(--ink);border-color:var(--ink);color:var(--paper-card)}
.opt.exam-selected{border-color:var(--gold);background:var(--gold-soft)}
.opt.exam-selected .bubble{background:var(--gold);border-color:var(--gold);color:#fff}
.opt.correct{border-color:var(--green);background:var(--green-bg)}
.opt.correct .bubble{background:var(--green);border-color:var(--green);color:#fff}
.opt.incorrect{border-color:var(--red);background:var(--red-bg)}
.opt.incorrect .bubble{background:var(--red);border-color:var(--red);color:#fff}
.opt.missed{border-color:var(--green);border-style:dashed}
.opt.missed .bubble{background:transparent;border-color:var(--green);color:var(--green)}
.opt-text{font-size:14px;line-height:1.5;padding-top:2px;flex:1}

/* ------ Feedback ------ */
.feedback{margin-top:16px;padding:14px 16px;border-radius:var(--radius);font-size:14px;line-height:1.5;animation:slideUp .25s ease}
.feedback.ok{background:var(--green-bg);color:var(--green)}
.feedback.bad{background:var(--red-bg);color:var(--red)}
.actions{display:flex;gap:10px;margin-top:18px}
.actions button{flex:1}

/* ------ Submit Bar (exam) ------ */
.submit-bar{
  position:sticky;bottom:0;margin-top:24px;padding:16px 0 calc(8px + var(--safe-bottom));
  background:linear-gradient(transparent,var(--paper) 30%);z-index:10;
}
.submit-bar .btn-primary{animation:slideUp .3s ease}

/* ------ Results ------ */
.score-hero{text-align:center;padding:20px 0 8px}
.score-num{font-family:var(--serif);font-size:56px;font-weight:700;color:var(--ink);line-height:1}
.score-num.excellent{background:linear-gradient(135deg,var(--gold),var(--gold-bright));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.breakdown{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin:24px 0}
.bd-item{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius-sm);padding:14px;text-align:center}
.bd-item .bname{font-size:10px;color:var(--ink-soft);font-family:var(--mono);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
.bd-item .bscore{font-size:20px;font-weight:700}
.review-list{margin-top:6px}
.review-item{border-top:1px solid var(--line);padding:18px 0}
.review-item:first-child{border-top:none}
.review-q{font-family:var(--serif);font-size:14px;font-weight:500;margin:0 0 8px;white-space:pre-wrap}
.review-line{font-size:13px;margin:3px 0;display:flex;gap:6px}
.review-line .rl{color:var(--ink-soft)}
.review-line.correct-ans{color:var(--green)}
.review-line.wrong-ans{color:var(--red)}

/* ------ Stats ------ */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.stat-card{padding:20px 16px;text-align:center;border:1px solid var(--line);border-radius:var(--radius);background:var(--paper)}
.stat-card .stat-num{font-family:var(--serif);font-size:34px;font-weight:700;color:var(--ink)}
.stat-card .stat-label{font-size:10px;color:var(--ink-soft);font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;margin-top:3px}
.sec-stats{display:flex;flex-direction:column;gap:10px}
.sec-stat-row{display:flex;align-items:center;gap:12px;padding:8px 4px}
.sec-stat-row .slabel{font-size:12px;font-weight:500;min-width:28px;color:var(--ink-soft)}
.sec-stat-row .sbar{flex:1;height:8px;background:var(--line);border-radius:4px;overflow:hidden}
.sec-stat-row .sbar-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-bright));border-radius:4px;transition:width .6s ease}
.sec-stat-row .spct{font-family:var(--mono);font-size:11px;color:var(--ink-soft);min-width:44px;text-align:right}
.history-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 0;border-top:1px solid var(--line);gap:8px;
}
.history-item:first-child{border-top:none}
.history-item .hleft{display:flex;align-items:center;gap:8px;min-width:0}
.history-item .hbadge{
  font-size:9px;padding:2px 6px;border-radius:4px;font-family:var(--mono);
  background:var(--gold-soft);color:var(--gold);flex-shrink:0;
}
.history-item .hname{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.history-item .hscore{font-family:var(--mono);font-size:13px;flex-shrink:0;color:var(--ink-soft)}

/* ------ Custom Modal ------ */
.modal-overlay{
  position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.45);
  display:flex;align-items:center;justify-content:center;padding:24px;
  animation:fadeIn .2s ease;backdrop-filter:blur(4px);
}
.modal{
  background:var(--paper-card);border:1px solid var(--line);border-radius:var(--radius-lg);
  padding:28px 24px 24px;max-width:400px;width:100%;animation:scaleIn .25s ease;
  box-shadow:var(--shadow-lg);
}
.modal-title{font-family:var(--serif);font-size:19px;font-weight:600;color:var(--ink);margin-bottom:8px;text-align:center}
.modal-body{font-size:14px;color:var(--ink-soft);line-height:1.55;text-align:center;margin-bottom:22px}
.modal-body strong{color:var(--ink)}
.modal-actions{display:flex;flex-direction:column;gap:10px}
.modal-actions.row{flex-direction:row}
.modal-actions.row .btn-primary,.modal-actions.row .btn-secondary{flex:1}

/* ------ Badge ------ */
.badge{
  display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;
  font-family:var(--mono);font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;
}
.badge.exam{background:var(--gold-soft);color:var(--gold)}
.badge.section{background:var(--blue-bg);color:var(--blue)}
.badge.test{background:var(--green-bg);color:var(--green)}

/* ------ Empty state ------ */
.empty-state{text-align:center;padding:40px 16px;color:var(--ink-soft);font-size:14px;line-height:1.6}

/* ------ Confetti overlay ------ */
.confetti-container{
  position:fixed;inset:0;pointer-events:none;z-index:999;overflow:hidden;
}
.confetti-piece{
  position:absolute;top:-10px;width:8px;height:8px;border-radius:2px;
  animation:confetti-fall 2.5s linear forwards;
}

/* ------ Responsive ------ */
@media(max-width:480px){
  #app{padding:calc(12px + var(--safe-top)) 12px calc(20px + var(--safe-bottom))}
  h1{font-size:26px}
  .card{padding:18px}
  .qtext{font-size:16px}
  .score-num{font-size:44px}
  .menu-btn{padding:16px 18px}
  .menu-btn .icon{width:44px;height:44px;font-size:20px}
  .opt{padding:12px 14px;min-height:50px}
  .opt .bubble{width:26px;height:26px;font-size:12px}
  .sec-grid{gap:8px}
  .sec-card{padding:14px}
  .stat-grid{gap:8px}
  .stat-card .stat-num{font-size:28px}
  .palette-dot{width:26px;height:26px;font-size:9px}
  .modal{padding:24px 20px 20px}
  .bd-item{padding:12px}
}
@media(min-width:481px){
  .sec-grid{grid-template-columns:repeat(4,1fr)}
}

<script>
const QUESTIONS = [{"id": "A.1", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Ce anume se specifică prin tipul unei date?", "opts": {"a": "numai numărul de octeți ocupați;", "b": "numai spațiul necesar reprezentării și modul de reprezentare;", "c": "numai operațiile permise."}, "ans": ["b"]}, {"id": "A.2", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Ce este o variabilă?", "opts": {"a": "litera care ține locul unor valori (de exemplu a, b, c sau x, y, z);", "b": "o valoare care se schimbă;", "c": "o zonă de memorie identificabilă în care se pot păstra valori."}, "ans": ["c"]}, {"id": "A.3", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Ce caracteristică a unei variabile este precizată de clasa sa de memorare?", "opts": {"a": "locul unde poate fi folosită;", "b": "locul unde se creează;", "c": "locul unde este memorată."}, "ans": ["b"]}, {"id": "A.4", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Domeniul identificatorilor de variabile globale ține din locul declarației până la:", "opts": {"a": "sfârșitul blocului;", "b": "sfârșitul programului;", "c": "sfârșitul textului sursă."}, "ans": ["c"]}, {"id": "A.5", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Durata de viață a variabilelor globale este:", "opts": {"a": "cât timp sunt utilizate;", "b": "câteva minute;", "c": "cât durează execuția programului."}, "ans": ["c"]}, {"id": "A.6", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Durata de viață a variabilelor locale este:", "opts": {"a": "cât timp sunt utilizate;", "b": "cât durează execuția subprogramului;", "c": "depinde de clasa lor de memorare."}, "ans": ["c"]}, {"id": "A.7", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Care din următorii operatori admit operanzi reali?", "opts": {"a": "operatorii de incrementare/decrementare", "b": "operatorii logici", "c": "operatorii logici pe biți", "d": "operatorii de deplasare"}, "ans": ["a", "b"]}, {"id": "A.8", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Când au loc conversii implicite de tip?", "opts": {"a": "la citirea datelor de intrare respectiv la afișarea rezultatelor;", "b": "când operanzii unei expresii au tipuri diferite;", "c": "când argumentul actual cu care se apelează o funcție are alt tip decât argumentul formal corespunzător."}, "ans": ["b", "c"]}, {"id": "A.9", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Se consideră șirul lui Fibonacci dat de relația de recurență F0=0, F1=1 și Fn+1=Fn+Fn-1. De câte ori este evaluat F2 pentru a calcula F5 în cazul calculului termenului Fn în mod recursiv?", "opts": {"a": "de 3 ori", "b": "o dată", "c": "de 4 ori"}, "ans": ["a"]}, {"id": "A.10", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Care este rezultatul numeric al evaluării unei expresii relaționale sau logice?", "opts": {"a": "FALSE sau TRUE;", "b": "0 sau 1;", "c": "0 sau diferit de 0."}, "ans": ["b"]}, {"id": "A.11", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Dacă a=-2, b=-1 și c=0, care este rezultatul numeric al evaluării expresiei a<b<c?", "opts": {"a": "1;", "b": "depinde de declarația de tip a variabilelor a, b, c;", "c": "0."}, "ans": ["c"]}, {"id": "A.12", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Care dintre următoarele afirmații este/sunt adevărată/adevărate pentru algoritmul corespunzător funcției de mai jos (se consideră că a este un tablou unidimensional cu n elemente)?\ndef transform(a):\n    n=len(a)\n    for i in range(0,n-1):\n        if (a[i]<a[i+1]):\n            a[i], a[i+1] = a[i+1], a[i]\n    return(a)", "opts": {"a": "Algoritmul sortează descrescător tabloul a", "b": "După aplicarea algoritmului, tabloul a satisface proprietatea a[i] ≥ a[n-1] pentru 0≤i<n", "c": "Algoritmul sortează crescător tabloul a", "d": "După aplicarea algoritmului, tabloul a satisface proprietatea a[i] ≤ a[n-1] pentru 0≤i<n"}, "ans": ["b"]}, {"id": "A.13", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Fie declarațiile: int x=10, y=20. Care este valoarea expresiei !x-y?", "opts": {"a": "0;", "b": "-10;", "c": "-20."}, "ans": ["c"]}, {"id": "A.14", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Fie declarațiile: int x=8, y=20. Care este valoarea expresiei x--/++y?", "opts": {"a": "0;", "b": "3;", "c": "0.399875."}, "ans": ["a"]}, {"id": "A.15", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Care din următoarele variante reprezintă modalități de comunicare între funcții?", "opts": {"a": "prin argumentele actuale;", "b": "prin valoarea returnata;", "c": "prin variabile globale."}, "ans": ["a", "b", "c"]}, {"id": "A.16", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Ce este contextul de apel al unei funcții?", "opts": {"a": "lista argumentelor formale;", "b": "o zonă de memorie (stivă);", "c": "instrucțiunile (definiția funcției)."}, "ans": ["b"]}, {"id": "A.17", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Care din următoarele acțiuni au loc la compilarea unui fișier sursă în C?", "opts": {"a": "analiza lexicală", "b": "includerea fișierelor header", "c": "analiza sintactica", "d": "generarea codului obiect", "e": "editarea de legături"}, "ans": ["a", "c", "d"]}, {"id": "A.18", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Transmiterea argumentelor către funcția apelată (convenția de apel C) se face:", "opts": {"a": "prin variabile globale;", "b": "prin valoare;", "c": "în ordine inversă celei din lista de argumente."}, "ans": ["b", "c"]}, {"id": "A.19", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Ce este o funcție recursivă?", "opts": {"a": "o funcție care recurge la context;", "b": "o funcție cu lista variabilă de argumente;", "c": "o funcție care se autoapelează."}, "ans": ["c"]}, {"id": "A.20", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Ce este un pointer?", "opts": {"a": "un indicator;", "b": "o adresă de memorie;", "c": "o variabilă a cărei valoare se interpretează ca adresă."}, "ans": ["c"]}, {"id": "A.21", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Cât spațiu de memorie ocupă o variabilă structură:", "opts": {"a": "cât spațiu ocupă de cel mai \"voluminos\" dintre membri;", "b": "egal cu suma spațiilor necesare membrilor;", "c": "cel puțin cât suma spațiilor necesare membrilor."}, "ans": ["c"]}, {"id": "A.22", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Care din afirmațiile următoare, referitoare la structuri, sunt adevărate:", "opts": {"a": "sunt tipuri de date agregate;", "b": "sunt tipuri de date definite de programator;", "c": "sunt tipuri de date predefinite."}, "ans": ["a", "b"]}, {"id": "A.23", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Care din următoarele operații sunt legale:", "opts": {"a": "returnarea unei structuri ca valoare a unei funcții;", "b": "adunarea a două structuri;", "c": "copierea unei structuri."}, "ans": ["a", "c"]}, {"id": "A.24", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "În care dintre următoarele prelucrări repetitive este posibil să nu se efectueze niciodată corpul ciclului?", "opts": {"a": "FOR;", "b": "REPEAT;", "c": "WHILE."}, "ans": ["a", "c"]}, {"id": "A.25", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Într-o prelucrare repetitivă cu contor (de tip FOR) ordinea efectuării operațiilor este:", "opts": {"a": "inițializare, modificare contor, corp ciclu, testare;", "b": "inițializare, testare, corp ciclu, modificare contor;", "c": "inițializare, corp ciclu, modificare contor, testare."}, "ans": ["b"]}, {"id": "A.26", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Care dintre următoarele afirmații sunt adevărate pentru o prelucrare repetitivă de tip WHILE?", "opts": {"a": "se începe cu verificarea condiției;", "b": "corpul ciclului se execută cel puțin o dată;", "c": "este posibil să nu se execute nici o dată corpul ciclului."}, "ans": ["a", "c"]}, {"id": "A.27", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Efectul execuției următoarelor secvențe:\nfor(exp_1; exp_2; exp_3)\n  instrucțiune;\nversus\nexp_1;\nwhile(exp_2)\n{ instrucțiune;\n  exp_3; }\neste:", "opts": {"a": "identic;", "b": "diferit;", "c": "dependent de context."}, "ans": ["a"]}, {"id": "A.28", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Se consideră secvența în pseudocod:\na=3\nREPEAT\n  a=a*a\nUNTIL a=n\nPentru ce valori ale lui n ciclul de mai sus nu este infinit?", "opts": {"a": "pentru orice valoare naturală multiplu de 3;", "b": "pentru orice valoare naturală care este pătratul unui multiplu de 3;", "c": "pentru orice putere a lui 3 al cărui exponent este o putere a lui 2."}, "ans": ["c"]}, {"id": "A.29", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Fie x[1..n] un tablou cu elemente întregi și secvența în pseudocod:\nFOR i=1, m, +1 DO\n  a=x[i]\n  x[i]=x[n-i+1]\n  x[n-i+1]=a\nENDFOR\nCe valoare ar trebui să aibă m astfel încât efectul secvenței de mai sus să fie inversarea ordinii elementelor tabloului și numărul de interschimbări să fie cât mai mic?", "opts": {"a": "n;", "b": "n DIV 2;", "c": "3n DIV 2."}, "ans": ["b"]}, {"id": "A.30", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Se consideră secvența în pseudocod:\nFOR i=1,n,+ DO\n  FOR j=i+1,n,+1 DO\n    WRITE (i,j)\n  ENDFOR\nENDFOR\nPrin execuția prelucrărilor de mai sus se vor afișa:", "opts": {"a": "toate perechile de forma (i,j) cu 1≤i≤n și 1≤j≤n;", "b": "toate perechile de forma (i,j) cu 1≤i≤n și 1≤j≤n și i<j;", "c": "toate perechile de forma (i,j) cu 1≤i≤n și 1≤j≤n și i≤j."}, "ans": ["c"]}, {"id": "A.31", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Fie x[1..n] un tablou cu elemente reale. Se consideră secvența în pseudocod:\nFOR i=1,n-1,1 DO\n  IF x[i]>x[i+1] THEN\n    aux=x[i]\n    x[i]=x[i+1]\n    x[i+1]=aux\n  ENDIF\nENDFOR\nCe efect are secvența de prelucrări asupra tabloului x?", "opts": {"a": "ordonează crescător elementele lui x;", "b": "aduce cea mai mare valoare pe ultima poziție din tablou;", "c": "inversează ordinea elementelor tabloului."}, "ans": ["b"]}, {"id": "A.32", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "La adunarea a două matrice a[1..m,1..n] și b[1..m,1..n] numărul de operații de adunare efectuate asupra elementelor este:", "opts": {"a": "m+n;", "b": "m*n;", "c": "max{m,n}."}, "ans": ["b"]}, {"id": "A.33", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "La înmulțirea a două matrice a[1..m,1..n] și b[1..n,1..p] numărul de operații de înmulțire efectuate este:", "opts": {"a": "m+n+p;", "b": "m*n+n*p;", "c": "m*n*p."}, "ans": ["c"]}, {"id": "A.34", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Componentele unei structuri de date:", "opts": {"a": "pot fi la rândul lor structuri de date;", "b": "pot fi toate de același tip;", "c": "pot avea unul din tipurile standard ale limbajului de programare utilizat."}, "ans": ["a", "b", "c"]}, {"id": "A.35", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Următoarea structură de date:\nstruct genealogie {\n  char numepren[20];\n  struct genealogie mama, tata;\n};", "opts": {"a": "nu este o structură recursivă;", "b": "este o descriere greșită în limbajul \"C\" a structurii genealogie;", "c": "este descrierea, în limbajul \"C\", utilizată în practică pentru a descrie structura de arbore genealogic al unei persoane."}, "ans": ["b"]}, {"id": "A.36", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "O structură dinamică de date este o structură de date care:", "opts": {"a": "se generează pe parcursul prelucrării;", "b": "este fixă ca formă și dimensiune;", "c": "în momentul compilării nu este cunoscut spațiul de memorie necesar ce urmează a-i fi alocat."}, "ans": ["a", "c"]}, {"id": "A.37", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Un fișier:", "opts": {"a": "este o structură externă de date;", "b": "este o colecție de date pe care s-a definit o anumită structură și căreia îi este specific un anumit mecanism de selecție și identificare;", "c": "este o colecție omogenă de date din punctul de vedere al semnificației și al cerințelor de prelucrare, depusă pe un suport extern de memorare."}, "ans": ["a", "b", "c"]}, {"id": "A.38", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Modul de acces la înregistrările unui fișier poate fi, în funcție de modul de organizare:", "opts": {"a": "aleator;", "b": "secvențial;", "c": "direct."}, "ans": ["b", "c"]}, {"id": "A.39", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Dacă într-un fișier înregistrările sunt depuse în mod continuu pe suport (în locații succesive), în ordinea în care sunt furnizate înregistrările, se spune că fișierul este de organizare:", "opts": {"a": "aleatoare;", "b": "secvențială;", "c": "relativă."}, "ans": ["b"]}, {"id": "A.40", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Dacă într-un fișier informația este depusă pe suport în funcție de valoarea unui câmp cheie, se spune că fișierul este de organizare:", "opts": {"a": "aleatoare;", "b": "secvențială;", "c": "relativă."}, "ans": ["a"]}, {"id": "A.41", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Se numește listă liniară:", "opts": {"a": "structura de date în care inserările, suprimările și orice alt acces se efectuează la unul din capetele listei;", "b": "o colecție de n≥0 elemente de același tip, ale căror proprietăți structurale se reduc la pozițiile relative liniare (unidimensionale) ale elementelor în cadrul structurii;", "c": "o structură de date asimilată cu un tablou în care elementele sunt memorate într-o zonă continuă de memorie, în locații succesive."}, "ans": ["b"]}, {"id": "A.42", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "O listă liniară simplu înlănțuită este:", "opts": {"a": "lista liniară, în care relația de ordonare este materializată pe suport printr-un pointer către elementul următor;", "b": "o structură de date implementată prin tipul tablou;", "c": "o structură explicită și recursivă."}, "ans": ["a", "c"]}, {"id": "A.43", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Algoritmul de sortare rapidă este cel mai potrivit pentru:", "opts": {"a": "sortarea unei liste mari cu elemente aleatoare", "b": "sortarea unei liste aproape ordonate", "c": "sortarea unei liste scurte", "d": "nu este potrivit pentru nici un fel de sortare"}, "ans": ["a"]}, {"id": "A.44", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "O stivă este:", "opts": {"a": "listă liniară în care inserările se fac la un capăt al listei și suprimările la celălalt capăt al listei;", "b": "o listă liniară de tipul LIFO (Last In First Out);", "c": "o listă liniară în care se manipulează mereu elementul cel mai recent introdus."}, "ans": ["b", "c"]}, {"id": "A.45", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Care din afirmațiile următoare sunt greșite:", "opts": {"a": "stiva este o listă în care inserările, suprimările și orice alt acces se efectuează la un singur capăt numit vârf;", "b": "o stivă poate fi implementată fie static folosind tipul tablou, fie dinamic folosind tipul pointer;", "c": "o stivă este o listă de tip FIFO (First In First Out)."}, "ans": ["c"]}, {"id": "A.46", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "O structură de date de tip coadă este:", "opts": {"a": "structură de tip listă cu restricție la intrare;", "b": "o listă liniară de tipul FIFO (First In First Out);", "c": "o listă liniară în care inserările se efectuează la un capăt al listei, iar suprimările se efectuează la celălalt capăt al listei."}, "ans": ["b", "c"]}, {"id": "A.47", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "În cazul unei structuri de date de tip arbore:", "opts": {"a": "fiecare nod este subordonat direct unui alt nod;", "b": "fiecare nod este subordonat direct unui nod numit rădăcină;", "c": "fiecare nod, cu excepția nodului rădăcină, este subordonat direct unui alt nod."}, "ans": ["c"]}, {"id": "A.48", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Care din următoarele afirmații sunt adevărate:", "opts": {"a": "gradul maxim al nodurilor unui arbore se numește gradul arborelui;", "b": "numărul fiilor unui nod se numește gradul nodului;", "c": "un nod care nu are fii se numește nod terminal sau frunză."}, "ans": ["a", "b", "c"]}, {"id": "A.49", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Un arbore binar este perfect echilibrat:", "opts": {"a": "dacă nodurile terminale sunt doar pe ultimul nivel;", "b": "dacă nodurile terminale sunt doar pe ultimele două niveluri;", "c": "dacă numărul de noduri din subarborele stâng diferă de numărul de noduri din subarborele drept, cu cel mult 1."}, "ans": ["c"]}, {"id": "A.50", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Într-un arbore adâncimea unui nod este:", "opts": {"a": "egală cu lungimea celui mai lung drum de la nodul respectiv la un nod terminal;", "b": "egală cu înălțimea arborelui;", "c": "egală cu lungimea drumului unic de la rădăcină la acel nod."}, "ans": ["c"]}, {"id": "BD.1", "sec": "BD", "secName": "Baze de Date", "text": "Printr-o bază de date se înțelege:", "opts": {"a": "un fișier cu date;", "b": "colecție de informații stocate astfel încât să poată fi regăsite, modificate sau șterse;", "c": "un tabel cu înregistrări."}, "ans": ["b"]}, {"id": "BD.2", "sec": "BD", "secName": "Baze de Date", "text": "Principalele funcții ale unui SGBD sunt:", "opts": {"a": "stocarea, regăsirea și actualizarea datelor;", "b": "facilitează accesul simultan al mai multor utilizatori;", "c": "securizarea datelor prin parolare."}, "ans": ["a", "b", "c"]}, {"id": "BD.3", "sec": "BD", "secName": "Baze de Date", "text": "Avantajele accesării datelor printr-un SGBD sunt:", "opts": {"a": "asigurarea integrității datelor;", "b": "reducerea redondanței;", "c": "creșterea securității."}, "ans": ["a", "b", "c"]}, {"id": "BD.4", "sec": "BD", "secName": "Baze de Date", "text": "Limbajele de interogare utilizate în gestiunea BD pot fi:", "opts": {"a": "algebrice;", "b": "logice;", "c": "relaționale."}, "ans": ["a", "b", "c"]}, {"id": "BD.5", "sec": "BD", "secName": "Baze de Date", "text": "Datele stocate într-o bază de date sunt:", "opts": {"a": "scalare;", "b": "vectoriale;", "c": "complexe."}, "ans": ["c"]}, {"id": "BD.6", "sec": "BD", "secName": "Baze de Date", "text": "O colecție de date reprezintă:", "opts": {"a": "un set de date scalare;", "b": "un ansamblu de date omogene;", "c": "un vector."}, "ans": ["b"]}, {"id": "BD.7", "sec": "BD", "secName": "Baze de Date", "text": "Între două colecții de date se poate stabili:", "opts": {"a": "o corespondență;", "b": "o relație de subsidiaritate;", "c": "o relație de recurență."}, "ans": ["a"]}, {"id": "BD.8", "sec": "BD", "secName": "Baze de Date", "text": "Corespondența între două colecții poate fi:", "opts": {"a": "una la una;", "b": "una la mai multe;", "c": "mai multe la mai multe."}, "ans": ["a", "b", "c"]}, {"id": "BD.9", "sec": "BD", "secName": "Baze de Date", "text": "Relația între două colecții poate fi:", "opts": {"a": "nondirecțională;", "b": "unidirecțională;", "c": "bidirecțională."}, "ans": ["a", "b", "c"]}, {"id": "BD.10", "sec": "BD", "secName": "Baze de Date", "text": "O colecție de date poate fi legată printr-o relație de:", "opts": {"a": "doar de o singură altă colecție;", "b": "mai multe alte colecții;", "c": "nici una, una sau mai multe colecții."}, "ans": ["c"]}, {"id": "BD.11", "sec": "BD", "secName": "Baze de Date", "text": "O structură de date reprezintă:", "opts": {"a": "o colecție de date complexe;", "b": "o colecție de date scalare;", "c": "o colecție de date cu un mecanism de localizare."}, "ans": ["c"]}, {"id": "BD.12", "sec": "BD", "secName": "Baze de Date", "text": "Mecanismul de accesare al datelor poate fi:", "opts": {"a": "relațional;", "b": "secvențial;", "c": "direct."}, "ans": ["a", "b", "c"]}, {"id": "BD.13", "sec": "BD", "secName": "Baze de Date", "text": "O structură tabelară este divizibilă în:", "opts": {"a": "înregistrări;", "b": "câmpuri;", "c": "predicate."}, "ans": ["a", "b"]}, {"id": "BD.14", "sec": "BD", "secName": "Baze de Date", "text": "O bază de date relațională conține:", "opts": {"a": "un tabel conducător (rădăcină);", "b": "o structură arborescentă de tabele;", "c": "un set de reguli de fidelitate."}, "ans": ["b"]}, {"id": "BD.15", "sec": "BD", "secName": "Baze de Date", "text": "E.F.Codd a definit treisprezece reguli de fidelitate pentru:", "opts": {"a": "clienții bazei de date;", "b": "administratorul bazei de date;", "c": "bazele de date relaționale."}, "ans": ["c"]}, {"id": "BD.16", "sec": "BD", "secName": "Baze de Date", "text": "Limbajul SQL este un limbaj ce permite:", "opts": {"a": "crearea unei baze de date;", "b": "gestionarea datelor;", "c": "interogarea bazelor de date."}, "ans": ["a", "b", "c"]}, {"id": "BD.17", "sec": "BD", "secName": "Baze de Date", "text": "Limbajul SQL conține următoarele subseturi:", "opts": {"a": "Limbaj de definire a datelor;", "b": "Limbaj de manipulare a datelor;", "c": "Limbaj de gestionare a datelor."}, "ans": ["a", "b"]}, {"id": "BD.18", "sec": "BD", "secName": "Baze de Date", "text": "Schema unei baze de date cuprinde:", "opts": {"a": "tabelele, atributele și domeniile acestora;", "b": "restricțiile de integritate;", "c": "drepturile utilizatorilor."}, "ans": ["a", "b"]}, {"id": "BD.19", "sec": "BD", "secName": "Baze de Date", "text": "Limbajul SQL este:", "opts": {"a": "un standard unic;", "b": "un limbaj cu dialecte relativ diferite între ele;", "c": "o familie de limbaje independente fără elemente comune."}, "ans": ["b"]}, {"id": "BD.20", "sec": "BD", "secName": "Baze de Date", "text": "MySQL este:", "opts": {"a": "un mediu de dezvoltare a SGBD relaționale;", "b": "un limbaj de definire a datelor;", "c": "un dialect al SQL."}, "ans": ["c"]}, {"id": "BD.21", "sec": "BD", "secName": "Baze de Date", "text": "MySQL conține instrucțiuni pentru:", "opts": {"a": "definirea datelor;", "b": "programare procedurală;", "c": "programare obiectuală."}, "ans": ["a", "b"]}, {"id": "BD.22", "sec": "BD", "secName": "Baze de Date", "text": "Definirea datelor se face cu sub-limbajul:", "opts": {"a": "DLL;", "b": "DML;", "c": "DDL."}, "ans": ["c"]}, {"id": "BD.23", "sec": "BD", "secName": "Baze de Date", "text": "Există instrucțiuni pentru:", "opts": {"a": "crearea tabelelor;", "b": "definirea câmpurilor;", "c": "delimitarea domeniilor atributelor."}, "ans": ["a", "b", "c"]}, {"id": "BD.24", "sec": "BD", "secName": "Baze de Date", "text": "Protecția unei baze de date împotriva introducerii unor valori eronate se face prin:", "opts": {"a": "controlul permanent al administratorului;", "b": "domenii de inexistență;", "c": "restricții de integritate."}, "ans": ["c"]}, {"id": "BD.25", "sec": "BD", "secName": "Baze de Date", "text": "Ștergerea unei Baze de date este o operație din:", "opts": {"a": "doar sub-limbajul de definire a datelor;", "b": "doar sub-limbajul de manipulare a datelor;", "c": "ambele sub-seturi."}, "ans": ["a"]}, {"id": "BD.26", "sec": "BD", "secName": "Baze de Date", "text": "Declararea atributelor în MySQL se face astfel:", "opts": {"a": "tip_data nume_data;", "b": "tip_data(lungime) nume_data;", "c": "nume_data tip_data(lungime)."}, "ans": ["c"]}, {"id": "BD.27", "sec": "BD", "secName": "Baze de Date", "text": "Dialectul MySQL cuprinde următoarele tipuri de date:", "opts": {"a": "numerice;", "b": "șir;", "c": "dată calendaristică."}, "ans": ["a", "b", "c"]}, {"id": "BD.28", "sec": "BD", "secName": "Baze de Date", "text": "Tipul varchar este:", "opts": {"a": "identic cu char;", "b": "economisește spațiu fiind mai flexibil decât char;", "c": "necesită ZEROFILL."}, "ans": ["b"]}, {"id": "BD.29", "sec": "BD", "secName": "Baze de Date", "text": "Tipul decimal se poate folosi astfel:", "opts": {"a": "decimal(m,d);", "b": "decimal(m);", "c": "decimal."}, "ans": ["a"]}, {"id": "BD.30", "sec": "BD", "secName": "Baze de Date", "text": "Coloana timestamp(12) are formatul:", "opts": {"a": "YYMMDDhhmmss;", "b": "YY-MM-DD hh:mm;", "c": "YYMMDDHHMMSS."}, "ans": ["c"]}, {"id": "BD.31", "sec": "BD", "secName": "Baze de Date", "text": "Crearea unei baze de date se face cu comanda:", "opts": {"a": "CREATE DATABASE;", "b": "CREATE DATABASE nume_bd;", "c": "CREATE DATABASE cale/nume_bd."}, "ans": ["b"]}, {"id": "BD.32", "sec": "BD", "secName": "Baze de Date", "text": "Crearea unui tabel se face cu sintaxa:", "opts": {"a": "CREATE TABLE nume_tab;", "b": "CREATE TABLE nume_tab(lista_nume_cmp);", "c": "CREATE TABLE nume_tab(lista_restrictii)."}, "ans": ["b"]}, {"id": "BD.33", "sec": "BD", "secName": "Baze de Date", "text": "Un tabel poate fi creat:", "opts": {"a": "prin declararea directă a câmpurilor sale;", "b": "prin copierea rezultatelor unei interogări;", "c": "prin indexare."}, "ans": ["a", "b"]}, {"id": "BD.34", "sec": "BD", "secName": "Baze de Date", "text": "Principalele restricții de integritate ale unei coloane sunt:", "opts": {"a": "not null;", "b": "default;", "c": "check out."}, "ans": ["a"]}, {"id": "BD.35", "sec": "BD", "secName": "Baze de Date", "text": "Ștergerea unei baze de date produce eliminarea:", "opts": {"a": "tuturor tabelelor componente;", "b": "directorului corespunzător bazei de date;", "c": "tuplei corespunzătoare bazei de date din SYSDBS."}, "ans": ["a"]}, {"id": "BD.36", "sec": "BD", "secName": "Baze de Date", "text": "Inserarea datelor într-un tabel se face cu instrucțiunile:", "opts": {"a": "INSERT INTO;", "b": "SET;", "c": "LOAD DATA INFILE."}, "ans": ["a", "c"]}, {"id": "BD.37", "sec": "BD", "secName": "Baze de Date", "text": "Instrucțiunea INSERT permite introducerea într-un tabel a:", "opts": {"a": "înregistrărilor complete;", "b": "valorilor unor câmpuri;", "c": "corecturilor."}, "ans": ["a", "b"]}, {"id": "BD.38", "sec": "BD", "secName": "Baze de Date", "text": "Instrucțiunea UPDATE are sintaxa:", "opts": {"a": "SET nume_cp= val/expr WHERE cond;", "b": "UPDATE nume_tab WHERE cond;", "c": "UPDATE nume_tab SET nume_cp= val/expr WHERE cond."}, "ans": ["c"]}, {"id": "BD.39", "sec": "BD", "secName": "Baze de Date", "text": "Instrucțiunea UPDATE poate modifica:", "opts": {"a": "numai un singur câmp dintr-o singură înregistrare;", "b": "mai multe câmpuri dintr-o singură înregistrare;", "c": "mai multe câmpuri din mai multe înregistrări."}, "ans": ["c"]}, {"id": "BD.40", "sec": "BD", "secName": "Baze de Date", "text": "Instrucțiunea DELETE șterge:", "opts": {"a": "înregistrări întregi;", "b": "câmpuri izolate;", "c": "câmpuri adiacente."}, "ans": ["a"]}, {"id": "BD.41", "sec": "BD", "secName": "Baze de Date", "text": "O propoziție SELECT trebuie obligatoriu să conțină:", "opts": {"a": "SELECT;", "b": "FROM;", "c": "WHERE."}, "ans": ["b"]}, {"id": "BD.42", "sec": "BD", "secName": "Baze de Date", "text": "Condițiile WHERE pot conține ca operatori:", "opts": {"a": "AND, OR și NOT;", "b": "=, <>, >, <;", "c": "LIKE, BETWEEN."}, "ans": ["a", "b", "c"]}, {"id": "BD.43", "sec": "BD", "secName": "Baze de Date", "text": "Sortarea descendentă a înregistrărilor se face cu:", "opts": {"a": "SELECT lista_cmp ORDER BY cmp_ord DESC;", "b": "SELECT lista_cmp WHERE cond SORT cmp_ord DESC;", "c": "SELECT lista_cmp FROM lista_tab WHERE cond."}, "ans": ["a"]}, {"id": "BD.44", "sec": "BD", "secName": "Baze de Date", "text": "Eliminarea duplicatelor se poate face cu:", "opts": {"a": "SELECT UNIQUE;", "b": "SELECT DISTINCT;", "c": "WHERE UNIQUE."}, "ans": ["b"]}, {"id": "BD.45", "sec": "BD", "secName": "Baze de Date", "text": "Clauza ORDER BY se poate folosi împreună cu:", "opts": {"a": "ASC;", "b": "DESC;", "c": "LIMIT."}, "ans": ["a", "b", "c"]}, {"id": "BD.46", "sec": "BD", "secName": "Baze de Date", "text": "O propoziție SELECT ce cuprinde mai multe tabele face:", "opts": {"a": "JOIN;", "b": "NATURAL_JOIN;", "c": "RIGHT_JOIN."}, "ans": ["a"]}, {"id": "BD.47", "sec": "BD", "secName": "Baze de Date", "text": "Directiva STRAIGHT_JOIN se plasează în cadrul zonei:", "opts": {"a": "SELECT;", "b": "FROM;", "c": "WHERE."}, "ans": ["b"]}, {"id": "BD.48", "sec": "BD", "secName": "Baze de Date", "text": "Uniunile se folosesc pentru a combina date din:", "opts": {"a": "mai multe câmpuri;", "b": "mai multe tabele;", "c": "mai multe baze de date."}, "ans": ["b"]}, {"id": "BD.49", "sec": "BD", "secName": "Baze de Date", "text": "Uniunile LEFT_JOIN se folosesc pentru:", "opts": {"a": "combinarea unor date din tabele disjuncte;", "b": "combinarea unor date din înregistrări disjuncte;", "c": "evidențierea tuplelor din T1 care nu au corespondent în T2."}, "ans": ["c"]}, {"id": "BD.50", "sec": "BD", "secName": "Baze de Date", "text": "În MySQL se utilizează:", "opts": {"a": "EQUI_JOIN;", "b": "SEMI_JOIN;", "c": "RIGHT_JOIN."}, "ans": ["c"]}, {"id": "J.1", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Dintr-o singură clasă de bază se pot deriva:", "opts": {"a": "Doar o singură clasă fiică;", "b": "Mai multe clase fiică;", "c": "Nu se pot deriva clasele."}, "ans": ["b"]}, {"id": "J.2", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "În Java metodele sunt scrise:", "opts": {"a": "în interiorul declarației clasei din care fac parte;", "b": "în afara declarației clasei din care fac parte;", "c": "Ambele."}, "ans": ["a"]}, {"id": "J.3", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Crearea unui obiect se face prin:", "opts": {"a": "Instanțiere;", "b": "Cu ajutorul unui constructor;", "c": "Prin simpla declarare."}, "ans": ["a", "b"]}, {"id": "J.4", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Instanțierea unui obiect produce:", "opts": {"a": "Rezervarea spațiului în memorie pentru acel obiect;", "b": "Eliminarea clasei utilizate;", "c": "Atribuirea de valori pentru datele membre."}, "ans": ["a", "c"]}, {"id": "J.5", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Clasele dintr-un program pot fi:", "opts": {"a": "Independente;", "b": "Derivate dintr-o clasă de bază;", "c": "Ambele."}, "ans": ["a", "b", "c"]}, {"id": "J.6", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Într-un program scris în limbajul Java se poate afla:", "opts": {"a": "O singură clasă;", "b": "Mai multe clase;", "c": "Nu se pun clasele în program, ci în biblioteci."}, "ans": ["b"]}, {"id": "J.7", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "În limbajul Java tipurile simple de date pot fi definite:", "opts": {"a": "În mod identic cu programele procedurale;", "b": "Sub forma unor clase;", "c": "În ambele moduri."}, "ans": ["a", "b", "c"]}, {"id": "J.8", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "După compilare clasele Java se vor găsi plasate în:", "opts": {"a": "Fișierul Java inițial;", "b": "Un fișier executabil cu extensia \".exe\";", "c": "În fișiere cu extensia \".class\" separate."}, "ans": ["c"]}, {"id": "J.9", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Limbajul Java este independent de platformă fiindcă:", "opts": {"a": "Este pur obiectual;", "b": "Rulează pe o mașină virtuală emulată;", "c": "Nu folosește biblioteci de funcții."}, "ans": ["b"]}, {"id": "J.10", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Pentru scrierea unui applet Java sunt obligatoriu necesare:", "opts": {"a": "Biblioteci de clase Java;", "b": "Editoare de fișiere java și html;", "c": "Un browser compatibil Java."}, "ans": ["b", "c"]}, {"id": "J.11", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Un bloc de testare a apariției unei excepții conține obligatoriu:", "opts": {"a": "Instrucțiunea \"if\";", "b": "Instrucțiunea \"try\";", "c": "Instrucțiunea \"finally\"."}, "ans": ["b"]}, {"id": "J.12", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Limbajul Java permite scrierea de:", "opts": {"a": "Clase de erori proprii;", "b": "Clase de excepții proprii;", "c": "Blocuri de testare multiple."}, "ans": ["a", "b", "c"]}, {"id": "J.13", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "O clasă proprie de excepții se declară:", "opts": {"a": "Cu sintaxa valabilă pentru orice clasă;", "b": "În interiorul unui bloc \"try.catch\";", "c": "Nu se declară."}, "ans": ["a", "b"]}, {"id": "J.14", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Un bloc \"try.catch\" pentru mai multe tipuri de erori cuprinde obligatoriu:", "opts": {"a": "O singură instrucțiune \"try\";", "b": "Câte o instrucțiune \"catch\" pentru fiecare eroare;", "c": "O instrucțiune \"finally\"."}, "ans": ["a", "b"]}, {"id": "J.15", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "O metodă a cărei acțiune poate produce excepții trebuie să fie:", "opts": {"a": "Eliminată din start;", "b": "Modificată pentru a elimina orice risc;", "c": "Declarată ca fiind susceptibilă să facă acest lucru."}, "ans": ["c"]}, {"id": "J.16", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Conceptul de multitasking înseamnă:", "opts": {"a": "Execuția simultană a mai multor sarcini;", "b": "Multiplexarea în timp a sarcinilor de executat;", "c": "Execuția sarcinilor pe mai multe procesoare paralele."}, "ans": ["b"]}, {"id": "J.17", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Un fir de execuție se comportă în timpul rulării ca:", "opts": {"a": "Un bloc al programului;", "b": "Un pachet de clase;", "c": "O aplicație autonomă."}, "ans": ["c"]}, {"id": "J.18", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Un fir intră în execuție atunci când:", "opts": {"a": "Se naște;", "b": "Are prioritate;", "c": "Primește comanda start()."}, "ans": ["b", "c"]}, {"id": "J.19", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Un fir de execuție este blocat dacă primește comanda:", "opts": {"a": "sleep();", "b": "wait();", "c": "stop()."}, "ans": ["a", "b"]}, {"id": "J.20", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Un fir de execuție este oprit dacă:", "opts": {"a": "Este întrerupt de alt fir concurent;", "b": "S-au executat toate acțiunile aferente lui;", "c": "Întreaga execuție a programului este oprită."}, "ans": ["a", "b", "c"]}, {"id": "J.21", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Într-un program scris în Java o constantă poate fi:", "opts": {"a": "Declarată;", "b": "Inițializată;", "c": "Asignată."}, "ans": ["a", "b"]}, {"id": "J.22", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Care din secvențele de mai jos sunt corecte:", "opts": {"a": "final int A=0;", "b": "final int A=0; x=A;", "c": "final int A=0; A=A+1;"}, "ans": ["a", "b"]}, {"id": "J.23", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Care din acțiunile de mai jos sunt semnalate ca erori la compilare:", "opts": {"a": "Asignarea unei variabile cu valoarea unei constante;", "b": "Reutilizarea unei constante în același fișier;", "c": "Adunarea unei constante la o variabilă."}, "ans": ["b"]}, {"id": "J.24", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "O constantă se poate utiliza pentru a stabili:", "opts": {"a": "Un prag de comparație;", "b": "Un număr de repetări ale unui ciclu;", "c": "O contorizare."}, "ans": ["a", "b"]}, {"id": "J.25", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Diferența între o constantă și o variabilă în Java este:", "opts": {"a": "Nici una;", "b": "Modul de inițializare;", "c": "Stabilitatea valorii."}, "ans": ["c"]}, {"id": "J.26", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Vectorii diferă față de tabele prin faptul că:", "opts": {"a": "Acceptă ca elemente doar obiectele;", "b": "Permit alocarea dinamică;", "c": "Permit introducerea și eliminarea unor elemente."}, "ans": ["a", "b", "c"]}, {"id": "J.27", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Sintaxa de declarare a unui vector este:", "opts": {"a": "Vector nume_vector = new Vector();", "b": "Vector = new Vector(nume_vector);", "c": "Vector nume_vector = new Vector(int nr_locatii)."}, "ans": ["a"]}, {"id": "J.28", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Extragerea unui obiect din vector se face cu metoda:", "opts": {"a": "final synchronized Object elementAt(Object ob);", "b": "final synchronized int indexOf(Object ob);", "c": "final synchronized Object get(Object ob)."}, "ans": ["a"]}, {"id": "J.29", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Determinarea poziției unui obiect din vector se face cu:", "opts": {"a": "final synchronized Object elementAt(Object ob);", "b": "final synchronized int indexOf(Object ob);", "c": "final synchronized Object get(Object ob)."}, "ans": ["b"]}, {"id": "J.30", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Găsirea ultimului element al unui vector se face cu:", "opts": {"a": "final synchronized Object firstElement();", "b": "final synchronized Object lastElement();", "c": "final synchronized Object finalElement()."}, "ans": ["b"]}, {"id": "J.31", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Instrucțiunea \"switch\" se recomandă pentru:", "opts": {"a": "Secvențe cu o unică condiție de test;", "b": "Secvențe cu două condiții de test;", "c": "Secvențe cu mai multe-condiții de test."}, "ans": ["c"]}, {"id": "J.32", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "În limbajul Java se poate înlocui \"if...else if\" cu:", "opts": {"a": "Instrucțiunea \"for\";", "b": "Instrucțiunea \"?:\";", "c": "Instrucțiunea \"switch\"."}, "ans": ["c"]}, {"id": "J.33", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Instrucțiunea \"for\" devine buclă infinită dacă lipsește:", "opts": {"a": "Expresia de test", "b": "Valoarea inițială a contorului;", "c": "Incrementarea contorului."}, "ans": ["a", "c"]}, {"id": "J.34", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Particula \"while\" din \"do...while\" reprezintă:", "opts": {"a": "Începutul buclei;", "b": "Punctul de test;", "c": "Sfârșitul buclei."}, "ans": ["b", "c"]}, {"id": "J.35", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Instrucțiunile \"do...while\" și \"for\" sunt:", "opts": {"a": "Instrucțiuni de control al fluxului;", "b": "Echivalente;", "c": "Ne-echivalente."}, "ans": ["a", "b"]}, {"id": "J.36", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "În limbajul Java declarația unei clase cuprinde:", "opts": {"a": "Numele clasei;", "b": "Datele membre;", "c": "Funcțiile membre."}, "ans": ["a", "b", "c"]}, {"id": "J.37", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "În limbajul Java funcțiile membre sunt:", "opts": {"a": "Declarate în interiorul clasei;", "b": "Declarate în afara clasei;", "c": "În ambele moduri."}, "ans": ["a"]}, {"id": "J.38", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Diferențele esențiale între clase și structuri sunt:", "opts": {"a": "Clasele conțin în plus date membre;", "b": "Clasele conțin în plus funcții membre;", "c": "Clasele asigură încapsularea."}, "ans": ["b", "c"]}, {"id": "J.39", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "În limbajul Java obiectele sunt:", "opts": {"a": "Alternative ale claselor;", "b": "Instanțe ale claselor;", "c": "Structuri de clase înrudite."}, "ans": ["b"]}, {"id": "J.40", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Proprietatea de încapsulare a datelor constă în faptul că într-o clasă Java:", "opts": {"a": "Se găsesc date membre și funcții membre;", "b": "Funcțiile membre sunt numai \"in line\";", "c": "Doar funcțiile membre pot accesa datele."}, "ans": ["c"]}, {"id": "J.41", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Sintaxa de utilizare a unui constructor este:", "opts": {"a": "nume_obiect = new constructor;", "b": "nume_clasa nume_obiect = new constructor;", "c": "nume_clasa nume_obiect = constructor."}, "ans": ["b"]}, {"id": "J.42", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Dintr-o clasă se instanțiază obiecte prin:", "opts": {"a": "Utilizarea metodei \"main()\";", "b": "Asignarea datelor membre ale clasei;", "c": "Utilizarea constructorului."}, "ans": ["c"]}, {"id": "J.43", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Constructorul în Java:", "opts": {"a": "Nu are tip de valoare de retur;", "b": "Poate fi implicit;", "c": "Are același nume cu clasa."}, "ans": ["a", "b", "c"]}, {"id": "J.44", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Un obiect creat de un constructor este:", "opts": {"a": "Dotat cu aceleași datele membre ca și clasa;", "b": "Dotat cu aceleași funcții membre ca și clasa;", "c": "Dotat cu elemente suplimentare față de clasă."}, "ans": ["a", "b"]}, {"id": "J.45", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Două date membre ale aceluiași obiect sunt:", "opts": {"a": "Plasate în aceiași structura de date;", "b": "Accesibile acelorași metode;", "c": "Sunt inițializate la instanțierea obiectului."}, "ans": ["a", "b", "c"]}, {"id": "J.46", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Interfețele în Java:", "opts": {"a": "Au rolul de a înlocui moștenirea multiplă;", "b": "Funcționează ca niște clase abstracte;", "c": "Conțin date abstracte."}, "ans": ["a", "b"]}, {"id": "J.47", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Sintaxa de declarare a unei interfețe este:", "opts": {"a": "nume [extends intf_par] {[date și metode]};", "b": "interface nume {[date și metode]};", "c": "interface nume [extends intf_par] {[date și metode]}."}, "ans": ["b", "c"]}, {"id": "J.48", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "O clasă poate să:", "opts": {"a": "Moștenească mai multe clase părinte;", "b": "Implementeze mai multe interfețe;", "c": "Să implementeze doar o singură interfață."}, "ans": ["b"]}, {"id": "J.49", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Sintaxa de declarare a unei interfețe moștenitor este:", "opts": {"a": "interface nume_intf [extends intf_par];", "b": "interface nume_intf {[date și metode]};", "c": "interface nume_intf [extends intf_par]{[date și metode]}."}, "ans": ["a", "b"]}, {"id": "J.50", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Implementarea unei interfețe de către o clasă se face cu sintaxa:", "opts": {"a": "nume_cls num_intf {[date și metode]};", "b": "class num_cls extends num_intf {[date și metode]};", "c": "class num_cls implements num_intf {[date și metode]}."}, "ans": ["c"]}, {"id": "S.1", "sec": "S", "secName": "Securitate informatică", "text": "Care algoritm se încadrează în categoria algoritmilor de cifrare polialfabetici?", "opts": {"a": "Caesar;", "b": "Viginere;", "c": "Playfair."}, "ans": ["b"]}, {"id": "S.2", "sec": "S", "secName": "Securitate informatică", "text": "Care algoritm se încadrează în categoria algoritmilor de cifrare poligramici?", "opts": {"a": "Viginere;", "b": "Polybius;", "c": "Playfair."}, "ans": ["c"]}, {"id": "S.3", "sec": "S", "secName": "Securitate informatică", "text": "Care algoritm de criptare este algoritm asimetric?", "opts": {"a": "RSA;", "b": "Diffie-Hellman;", "c": "DES;", "d": "AES."}, "ans": ["a"]}, {"id": "S.4", "sec": "S", "secName": "Securitate informatică", "text": "Algoritmul DES criptează blocuri de:", "opts": {"a": "32 biți;", "b": "64 biți;", "c": "128 biți;", "d": "16 biți."}, "ans": ["b"]}, {"id": "S.5", "sec": "S", "secName": "Securitate informatică", "text": "Algoritmul DSA (Digital Signature Algorithm) este un algoritm care:", "opts": {"a": "Folosește cheie publică;", "b": "Folosește cheie publică și cheie secretă;", "c": "Folosește cheie secretă."}, "ans": ["b"]}, {"id": "S.6", "sec": "S", "secName": "Securitate informatică", "text": "Câți algoritmi cuprind în general schemele semnăturilor digitale:", "opts": {"a": "3;", "b": "2;", "c": "1."}, "ans": ["a"]}, {"id": "S.7", "sec": "S", "secName": "Securitate informatică", "text": "AES utilizează o dimensiune a cheii de biți de ____.", "opts": {"a": "64, 128 sau 192;", "b": "192 sau 256;", "c": "128, 192 sau 256;", "d": "64 sau 256."}, "ans": ["c"]}, {"id": "S.8", "sec": "S", "secName": "Securitate informatică", "text": "Câte chei sunt necesare pentru criptarea și decriptarea datelor atunci când folosim un cifru asimetric?", "opts": {"a": "0;", "b": "1;", "c": "2;", "d": "3."}, "ans": ["c"]}, {"id": "S.9", "sec": "S", "secName": "Securitate informatică", "text": "Care din următoarele opțiuni definește corect atacul de forță brută (Brute force attack)?", "opts": {"a": "Forțând brutal utilizatorul să partajeze informații utile, cum ar fi coduri și parole;", // --- Persistence ---
function loadPersisted(){
  try{

    if(raw) return JSON.parse(raw);
  }catch(e){}
  return null;
}
function savePersisted(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      completedTests: [...state.completedTests],
      history: state.history,
      darkMode: state.darkMode,
      instantFeedback: state.instantFeedback,
      sectionAttempts: state.sectionAttempts,

}

// --- Helpers ---
function esc(s){const d=document.createElement('div');d.innerText=s;return d.innerHTML}
function shuffle(a){const r=a.slice();for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]]}return r}
function arraysEqualAsSets(a,b){if(a.length!==b.length)return false;const sa=a.slice().sort(),sb=b.slice().sort();return sa.every((v,i)=>v===sb[i])}
function formatTime(ms){const s=Math.floor(Math.abs(ms)/1000),m=Math.floor(s/60),sec=s%60;return m+':'+(sec<10?'0':'')+sec}
function formatCountdown(sec){const m=Math.floor(sec/60),s=sec%60;return m+':'+(s<10?'0':'')+s}

// --- Modal system ---
function showModal(title, bodyHTML, buttons){
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `<div class="modal">
    <div class="modal-title">${title}</div>
    <div class="modal-body">${bodyHTML}</div>
    <div class="modal-actions ${buttons.length > 2 ? 'row' : ''}" id="modalActions"></div>
  </div>`;
  document.body.appendChild(overlay);
  const actions = overlay.querySelector('#modalActions');
  buttons.forEach((b, i) => {
    const btn = document.createElement('button');
    btn.className = b.primary ? 'btn-primary' : 'btn-secondary';
    if(b.danger) btn.className = 'btn-primary red';
    if(b.gold) btn.className = 'btn-primary gold';
    btn.textContent = b.label;
    btn.onclick = () => { overlay.remove(); if(b.action) b.action(); };
    actions.appendChild(btn);
  });
  overlay.onclick = e => { if(e.target === overlay) overlay.remove(); };
}

function closeModal(){
  const m = document.querySelector('.modal-overlay');
  if(m) m.remove();
}

  if(state.timerInterval){clearInterval(state.timerInterval);state.timerInterval=null}

function goBackToOrigin(){
  if(state.timerInterval){clearInterval(state.timerInterval);state.timerInterval=null}
  if(state.quizMode==='section'){state.screen='section-picker';render();return}
  if(state.quizMode==='test'){state.screen='tests';render();return}
  state.screen='home';render();
}

}

// ---------- EXAM ----------
function startExam(){
  const asked = state.examAttempts.length > 0 ? ' (ai mai dat ' + state.examAttempts.length + ' simulări)' : '';
  showModal('🎓 Simulare examen', 
    '<strong>50 de întrebări</strong> din toate secțiunile, randomizate.<br>' +
    '<strong>' + EXAM_TIME_MINUTES + ' minute</strong> la dispoziție.<br>' +
    'Nu există corectare imediată — vezi rezultatul la final.' + asked,
    [
      {label:'Anulează', primary:false, action:()=>{}},
      {label:'Începe examenul', primary:true, gold:true, action:()=>{
        beginExam();
      }}
    ]
  );
}

function beginExam(){
  // Pick 50 questions proportionally from all sections
  let pool = [];
  SECTIONS.forEach(s =>{
    const secQs = QUESTIONS.filter(q=>q.sec===s.code);
    const shuffled = shuffle(secQs);
    // Take ~12-13 per section to make 50
    const perSec = Math.round(EXAM_QUESTION_COUNT / SECTIONS.length);
    pool = pool.concat(shuffled.slice(0, perSec));
  });
  // If we have more than 50, trim; if less, fill randomly
  const remaining = EXAM_QUESTION_COUNT - pool.length;
  if(remaining > 0){
    const used = new Set(pool.map(q=>q.id));
    const extras = shuffle(QUESTIONS.filter(q=>!used.has(q.id))).slice(0, remaining);
    pool = pool.concat(extras);
  }
  state.quiz = shuffle(pool).slice(0, EXAM_QUESTION_COUNT);
  state.quizMode = 'exam';
  state.current = 0;
  state.answers = new Array(state.quiz.length).fill(null);
  state.currentSelection = [];
  state.locked = false;
  state.timerStarted = Date.now();
  state.countdownTotal = EXAM_TIME_MINUTES * 60;
  if(state.timerInterval){clearInterval(state.timerInterval);state.timerInterval=null}
  state.screen = 'quiz';
  render();
}

// ---------- QUIZ ----------
function renderQuiz(app){
  const q = state.quiz[state.current];
  if(!q) return;
  const isExam = state.quizMode === 'exam';
  const isMulti = q.ans.length > 1;
  const saved = state.answers[state.current];
  const totalQ = state.quiz.length;
  const pct = Math.round((state.current/totalQ)*100);
  const answeredCount = state.answers.filter(a=>a!==null).length;
  const elapsed = state.timerStarted ? (Date.now()-state.timerStarted) : 0;

  // In exam mode: selection from saved answer, no feedback/locked
  let currentSelection = state.currentSelection;
  if(isExam && saved){
    currentSelection = saved.selected || saved;
  }

  let label, badgeCls;
  if(isExam){label='Simulare examen'; badgeCls='exam'}
  else if(state.quizMode==='test'){label='Testul '+(state.testIndex+1); badgeCls='test'}
  else {label='Secțiunea '+state.sectionCode; badgeCls='section'}

  // Countdown for exam
  const countdownSec = isExam && state.countdownTotal !== null
    ? Math.max(0, state.countdownTotal - Math.floor(elapsed/1000))
    : null;
  const warn = countdownSec !== null && countdownSec < 300; // 5 min
  const critical = countdownSec !== null && countdownSec < 60;

  app.innerHTML = `
    <div class="top-bar">
      <div class="tb-start">
        <button class="btn-icon" id="backBtn">${isExam ? '✕' : '‹'}</button>
        <span class="badge ${badgeCls}">${isExam?'🎓':''} ${label}</span>
      </div>
      <div class="tb-end"${isExam?' style="min-width:70px;text-align:right"':''}>
        ${isExam ? '<span style="font-family:var(--mono);font-size:14px;font-weight:600;color:'+(critical?'var(--red-bright)':warn?'var(--red)':'var(--ink-soft)')+'" id="countdownDisplay">'+formatCountdown(countdownSec)+'</span>' :
        '<span class="qscore">' + state.answers.filter(a=>a&&a.correct).length + '/' + answeredCount + '</span>'}
      </div>
    </div>
    <div class="palette-wrap"><div class="palette" id="palette"></div></div>
    <div class="quiz-top">
      <span class="qmeta">
        <span>${state.current+1}/${totalQ}</span>
        ${!isExam ? '<span>·</span><span>'+q.sec+'</span>' : ''}
      </span>
      ${!isExam ? '<span class="qscore">'+(state.answers.filter(a=>a&&a.correct).length)+'/'+(state.answers.filter(a=>a!==null).length)+'</span>' : '<span class="qscore">' + answeredCount + '/' + totalQ + ' răsp</span>'}
    </div>
    <div class="progress-track"><div class="progress-fill ${isExam?'exam':''}" style="width:${pct}%"></div></div>
    ${!isExam ? '<div class="timer-bar"><span class="timer-icon">⏱</span>'+formatTime(elapsed)+'</div>' : ''}
    <div class="card swipe-zone" id="quizCard">
      <p class="qid">${q.id}</p>
      <p class="qtext">${esc(q.text)}</p>
      <p class="multi-hint">Poți selecta una sau mai multe variante, apoi verifică</p>
      <div class="opts" id="opts"></div>
      <div id="feedbackArea"></div>
      <div class="actions" id="actionsArea"></div>
    </div>
    ${isExam ? '<div class="submit-bar"><button class="btn-primary red" id="submitExamBtn">Trimite examenul</button></div>' : ''}
  `;

  // Countdown timer for exam
  if(isExam){
    if(state.timerInterval) clearInterval(state.timerInterval);
    state.timerInterval = setInterval(() => {
      const el = document.getElementById('countdownDisplay');
      if(!el){clearInterval(state.timerInterval);return}
      const sec = Math.max(0, state.countdownTotal - Math.floor((Date.now()-state.timerStarted)/1000));
      el.textContent = formatCountdown(sec);
      if(sec < 60) el.style.color = 'var(--red-bright)';
      else if(sec < 300) el.style.color = 'var(--red)';
      if(sec <= 0) { clearInterval(state.timerInterval); autoSubmitExam(); }
    }, 500);
  } else {
    if(state.timerInterval) clearInterval(state.timerInterval);
    state.timerInterval = setInterval(()=>{
      const el=document.getElementById('timer');
      if(el) el.innerHTML='<span class="timer-icon">⏱</span>'+formatTime(Date.now()-state.timerStarted);
    },1000);
  }

  // Palette
  const palette = app.querySelector('#palette');
  state.answers.forEach((a, i)=>{
    const dot=document.createElement('div');
    let cls='palette-dot';
    if(i===state.current) cls+=' current';
    if(a!==null){
      if(isExam){ cls+=' exam-saved'; }
      else {
        cls+=' answered';
        cls+= a.correct ? ' correct' : ' wrong';
      }
    }
    dot.className=cls;
    dot.textContent=i+1;
    dot.onclick=()=>{state.current=i;state.currentSelection=[];state.locked=false;render()};
    palette.appendChild(dot);
  });

  // Options
  const opts=app.querySelector('#opts');
  Object.keys(q.opts).forEach(letter=>{
    const div=document.createElement('div');
    let cls='opt';
    const sel = isExam
      ? (saved ? (Array.isArray(saved.selected||saved) && (saved.selected||saved).includes(letter)) : currentSelection.includes(letter))
      : (saved ? saved.selected.includes(letter) : currentSelection.includes(letter));
    if(sel) cls += isExam ? ' exam-selected' : ' selected';
    if(saved && !isExam){
      cls+=' locked';
      const isCorrectLetter=q.ans.includes(letter);
      if(isCorrectLetter && sel) cls+=' correct';
      else if(!isCorrectLetter && sel) cls+=' incorrect';
      else if(isCorrectLetter && !sel) cls+=' missed';
    }
    div.className=cls;
    div.innerHTML='<div class="bubble">'+letter.toUpperCase()+'</div><div class="opt-text">'+esc(q.opts[letter])+'</div>';
    if(isExam){
      div.onclick=()=>examToggleOption(letter);
    } else if(!saved){
      div.onclick=()=>toggleOption(letter);
    }

  });

  // Feedback & actions (non-exam)
  const feedbackArea=app.querySelector('#feedbackArea');
