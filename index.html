      if(state.instantFeedback) feedbackArea.appendChild(fb);
      const nb=document.createElement('button');
      nb.className='btn-primary';
      nb.innerText=state.current<state.quiz.length-1?'Continuă →':'Vezi rezultatul';
      nb.onclick=nextQuestion;
      actionsArea.appendChild(nb);
    } else if(state.currentSelection.length > 0){
      const sb=document.createElement('button');
      sb.className='btn-primary';
      sb.innerText='Verifică';
      sb.onclick=submitAnswer;
      actionsArea.appendChild(sb);
    }
  } else {
    // Exam: show navigation
    if(state.current < state.quiz.length-1){
      const nb=document.createElement('button');
      nb.className='btn-primary';
      nb.innerText='Următoarea →';
      nb.onclick=()=>{state.current++;state.currentSelection=[];render()};
      actionsArea.appendChild(nb);
    }
    // Submit exam
    app.querySelector('#submitExamBtn').onclick=confirmSubmitExam;
  }

  // Back
  app.querySelector('#backBtn').onclick=()=>{
    if(state.timerInterval){clearInterval(state.timerInterval);state.timerInterval=null}
    if(isExam){
      showModal('Renunți la examen?','Vei pierde progresul curent. Poți începe unul nou oricând.',
        [{label:'Continuă examenul',primary:false,action:()=>{}},
         {label:'Renunță',primary:true,danger:true,action:goHome}]);
    } else if(state.quizMode==='section'){
      showModal('Renunți la antrenament?','Progresul la această sesiune se va pierde.',
        [{label:'Continuă',primary:false,action:()=>{}},
         {label:'Renunță',primary:true,danger:true,action:()=>{state.screen='section-picker';render()}}]);
    } else {
      showModal('Renunți la test?','Progresul la acest test se va pierde.',
        [{label:'Continuă testul',primary:false,action:()=>{}},
         {label:'Renunță',primary:true,danger:true,action:goHome}]);
    }
  };

  // Swipe
  setupSwipe(app.querySelector('#quizCard'));
}

// Non-exam mode: user taps to toggle any option on/off
function toggleOption(letter){
  if(state.locked) return;
  const idx=state.currentSelection.indexOf(letter);
  if(idx>=0) state.currentSelection.splice(idx,1);
  else state.currentSelection.push(letter);
  render();
}

// Exam mode: save selection without computing correctness
function examToggleOption(letter){
  let saved=state.answers[state.current];
  let sel = saved ? (Array.isArray(saved.selected||saved) ? [...(saved.selected||saved)] : []) : [];
  if(!saved) saved={selected:[],correct:null};
  const idx=sel.indexOf(letter);
  if(idx>=0) sel.splice(idx,1); else sel.push(letter);
  state.answers[state.current] = {selected:sel,correct:null};
  state.currentSelection=sel;
  render();
}

function setupSwipe(el){
  if(!el) return;
  let sx=0,sy=0;
  el.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY},{passive:true});
  el.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;
    if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>60){
      if(dx<0&&state.current<state.quiz.length-1&&state.quizMode==='exam'){state.current++;state.currentSelection=[];render()}
      else if(dx>0&&state.current>0){state.current--;state.currentSelection=[];state.locked=false;render()}
    }
  },{passive:true});
}

// Non-exam submission
function submitAnswer(){
  if(state.currentSelection.length===0) return;
  const q=state.quiz[state.current];
  const correct=arraysEqualAsSets(state.currentSelection,q.ans);
  state.answers[state.current]={selected:state.currentSelection.slice(),correct};
  state.locked=true;
  render();
}

function nextQuestion(){
  if(state.current<state.quiz.length-1){state.current++;state.currentSelection=[];state.locked=false;render()}
  else finishQuiz();
}

function confirmSubmitExam(){
  const unanswered = state.answers.filter(a=>a===null||!a.selected||a.selected.length===0).length;
  const total = state.quiz.length;
  const answered = total - unanswered;
  if(unanswered > 0){
    showModal('Trimite examenul?',
      'Ai răspuns la <strong>' + answered + '/' + total + '</strong> întrebări.<br>' +
      (unanswered > 0 ? '<span style="color:var(--red)">' + unanswered + ' întrebări fără răspuns.</span>' : ''),
      [
        {label:'Mai verifică', primary:false, action:()=>{}},
        {label:'Trimite acum', primary:true, danger:unanswered>0, action:submitExam}
      ]
    );
  } else {
    showModal('Trimite examenul?', 'Ai răspuns la toate cele <strong>' + total + '</strong> întrebări.',
      [
        {label:'Mai verifică', primary:false, action:()=>{}},
        {label:'Trimite acum', primary:true, gold:true, action:submitExam}
      ]
    );
  }
}

function submitExam(){
  if(state.timerInterval){clearInterval(state.timerInterval);state.timerInterval=null}
  const total=state.quiz.length;
  let correct=0;
  state.quiz.forEach((q,i)=>{
    const a=state.answers[i];
    const sel = a ? (Array.isArray(a.selected||a) ? (a.selected||a) : []) : [];
    const isCorrect = arraysEqualAsSets(sel, q.ans);
    state.answers[i] = {selected:sel, correct:isCorrect};
    if(isCorrect) correct++;
  });
  const elapsed = state.timerStarted ? Date.now()-state.timerStarted : 0;
  state.examAttempts.push({
    type:'exam',
    label:'Simulare',
    total,correct,elapsed,
    date:Date.now()
  });
  savePersisted();
  state.screen='results';
  render();
}

function autoSubmitExam(){
  if(state.screen!=='quiz') return;
  showModal('⏰ Timpul a expirat!',
    'Examenul se trimite automat.',
    [{label:'Vezi rezultatul',primary:true,gold:true,action:submitExam}]
  );
}

function finishQuiz(){
  if(state.timerInterval){clearInterval(state.timerInterval);state.timerInterval=null}
  const elapsed = state.timerStarted ? Date.now()-state.timerStarted : 0;
  const total=state.quiz.length;
  const correct=state.answers.filter(a=>a&&a.correct).length;
  const entry={type:state.quizMode,label:state.quizMode==='test'?'Test '+(state.testIndex+1):'Sec. '+state.sectionCode,total,correct,elapsed,date:Date.now()};
  if(state.quizMode==='test'){state.completedTests.add(state.testIndex);state.history.push(entry)}
  else {
    if(!state.sectionAttempts[state.sectionCode]) state.sectionAttempts[state.sectionCode]=[];
    state.sectionAttempts[state.sectionCode].push(entry);
  }
  savePersisted();
  state.screen='results';render();
}

function retryQuiz(){
  state.current=0;
  state.answers=new Array(state.quiz.length).fill(null);
  state.currentSelection=[];
  state.locked=false;
  state.timerStarted=Date.now();
  state.screen='quiz';render();
}

// ---------- RESULTS ----------
function renderResults(app){
  const total=state.quiz.length;
  const correct=state.answers.filter(a=>a&&a.correct).length;
  const pct=Math.round((correct/total)*100);
  const bySec={};
  let label, isExamRes=false;
  if(state.quizMode==='exam'){label='Simulare examen';isExamRes=true}
  else if(state.quizMode==='test') label='Testul '+(state.testIndex+1);
  else label='Secțiunea '+state.sectionCode;

  state.quiz.forEach((q,i)=>{
    if(!bySec[q.sec]) bySec[q.sec]={correct:0,total:0};
    bySec[q.sec].total++;
    if(state.answers[i]&&state.answers[i].correct) bySec[q.sec].correct++;
  });

  const isExcellent = pct >= 80;
  const isGood = pct >= 60;

  app.innerHTML = `
    <div class="top-bar">
      <div class="tb-start"><button class="btn-icon" id="homeBtn">‹</button>
        <span class="badge ${isExamRes?'exam':state.quizMode==='test'?'test':'section'}">${isExamRes?'🎓':''} ${label}</span>
      </div>
      <div class="tb-end"><div style="width:44px"></div></div>
    </div>
    <div class="card">
      <div class="score-hero">
        <div class="score-num ${isExcellent?'excellent':''}">${correct}<span style="font-size:24px;opacity:.5;font-weight:500">/${total}</span></div>
        <div class="score-label">${pct}% răspunsuri corecte</div>
      </div>
      ${isExcellent ? '<div style="text-align:center;font-size:13px;color:var(--gold);font-weight:500;margin-top:4px">Excelent! 🎉</div>' : isGood ? '<div style="text-align:center;font-size:13px;color:var(--green);font-weight:500;margin-top:4px">Bun! Continuă antrenamentul.</div>' : '<div style="text-align:center;font-size:13px;color:var(--ink-soft);font-weight:400;margin-top:4px">Mai exersează pentru a îmbunătăți rezultatul.</div>'}
      <div class="breakdown" id="breakdown"></div>
      <button class="btn-primary" id="retryBtn">${isExamRes?'Simulează din nou':'Reia'}</button>
      <div style="display:flex;gap:10px;margin-top:10px">
        <button class="btn-secondary" id="homeBtn2" style="flex:1">${state.quizMode==='section'?'Alte secțiuni':state.quizMode==='test'?'Alte teste':'Meniu'}</button>
        ${isExamRes ? '<button class="btn-secondary" id="reviewBtn" style="flex:1">Revizuiește</button>' : ''}
      </div>
    </div>
    <div class="card" style="margin-top:16px" id="reviewCard"></div>
  `;

  const breakdown=app.querySelector('#breakdown');
  Object.keys(bySec).forEach(sec=>{
    const b=bySec[sec];
    const div=document.createElement('div');div.className='bd-item';
    div.innerHTML='<div class="bname">'+sec+'</div><div class="bscore">'+b.correct+'/'+b.total+'</div>';
    breakdown.appendChild(div);
  });

  app.querySelector('#retryBtn').onclick=retryQuiz;
  app.querySelector('#homeBtn').onclick=goBackToOrigin;
  app.querySelector('#homeBtn2').onclick=goBackToOrigin;

  // Review
  const reviewCard=app.querySelector('#reviewCard');
  const wrongOnes=state.quiz.map((q,i)=>({q,a:state.answers[i]})).filter(x=>!x.a||!x.a.correct);
  if(wrongOnes.length===0){
    reviewCard.innerHTML='<div class="card-header">Recapitulare</div><p style="font-size:14px;color:var(--ink-soft)">Toate răspunsurile au fost corecte!</p>';
  } else {
    let html='<div class="card-header">De revizuit ('+wrongOnes.length+')</div><div class="review-list">';
    wrongOnes.forEach(x=>{
      const q=x.q;
      const sel=x.a?x.a.selected.join(', ').toUpperCase():'—';
      html+='<div class="review-item">'+
        '<p class="qid">'+q.id+'</p>'+
        '<p class="review-q">'+esc(q.text)+'</p>'+
        '<p class="review-line wrong-ans"><span class="rl">Răspuns:</span> '+sel+'</p>'+
        '<p class="review-line correct-ans"><span class="rl">Corect:</span> '+q.ans.join(', ').toUpperCase()+' — '+q.ans.map(l=>esc(q.opts[l])).join(' ')+'</p>'+
      '</div>';
    });
    html+='</div>';
    reviewCard.innerHTML=html;
  }

  // Confetti for excellent
  if(isExcellent) launchConfetti();
}

function launchConfetti(){
  const container=document.createElement('div');
  container.className='confetti-container';
  document.body.appendChild(container);
  const colors=['var(--gold)','var(--green)','var(--blue)','var(--gold-bright)','#E8A87C','#95E1D3'];
  for(let i=0;i<40;i++){
    const piece=document.createElement('div');
    piece.className='confetti-piece';
    piece.style.left=Math.random()*100+'%';
    piece.style.background=colors[Math.floor(Math.random()*colors.length)];
    piece.style.width=(4+Math.random()*6)+'px';
    piece.style.height=(4+Math.random()*6)+'px';
    piece.style.animationDuration=(1.5+Math.random()*2)+'s';
    piece.style.animationDelay=(Math.random()*1.5)+'s';
    piece.style.borderRadius=Math.random()>.5?'50%':'2px';
    container.appendChild(piece);
  }
  setTimeout(()=>container.remove(),4000);
}

// ---------- STATS ----------
function renderStats(app){
  const all=[...state.history,...state.examAttempts];
  for(const k in state.sectionAttempts) state.sectionAttempts[k].forEach(a=>all.push(a));
  const totalQ=all.reduce((s,a)=>s+a.total,0);
  const correctQ=all.reduce((s,a)=>s+a.correct,0);
  const overallPct=totalQ>0?Math.round((correctQ/totalQ)*100):0;
  const recent=all.slice(-15).reverse();
  const examCount=state.examAttempts.length;

  // Per-section from sectionAttempts
  const sData={};SECTIONS.forEach(s=>sData[s.code]={correct:0,total:0});
  for(const k in state.sectionAttempts){if(sData[k]) state.sectionAttempts[k].forEach(a=>{sData[k].correct+=a.correct;sData[k].total+=a.total})}

  app.innerHTML = `
    <div class="top-bar">
      <div class="tb-start"><button class="btn-icon" id="backBtn">‹</button></div>
      <h2 class="tb-label">Statistici</h2>
      <div class="tb-end"><div style="width:44px"></div></div>
    </div>
    ${all.length===0?'<div class="empty-state">Încă nu ai completat niciun test.<br>Începe un test pentru a vedea statistici!</div>':`
    <div class="stat-grid">
      <div class="stat-card animate"><div class="stat-num">${all.length}</div><div class="stat-label">Teste date</div></div>
      <div class="stat-card animate"><div class="stat-num">${overallPct}%</div><div class="stat-label">Procentaj</div></div>
      <div class="stat-card animate"><div class="stat-num">${totalQ}</div><div class="stat-label">Întrebări</div></div>
      <div class="stat-card animate"><div class="stat-num">${correctQ}<span style="font-size:16px;opacity:.5;font-weight:400">/${totalQ}</span></div><div class="stat-label">Corecte</div></div>
    </div>
    ${examCount>0?`<div class="card" style="margin-bottom:16px"><div class="card-header">Simulări examen</div>
      <div style="text-align:center;padding:8px 0">
        <span style="font-size:42px;font-weight:700;font-family:var(--serif);color:var(--gold)">${examCount}</span>
        <span style="font-size:14px;color:var(--ink-soft);display:block;margin-top:2px">simulări date</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div style="text-align:center;padding:12px;background:var(--paper);border-radius:var(--radius-sm);border:1px solid var(--line)">
          <div style="font-size:24px;font-weight:700;font-family:var(--serif);color:var(--green)">${Math.round(state.examAttempts.reduce((s,a)=>s+a.correct/a.total*100,0)/Math.max(1,examCount))}%</div>
          <div style="font-size:10px;color:var(--ink-soft);font-family:var(--mono);text-transform:uppercase;margin-top:2px">Medie</div>
        </div>
        <div style="text-align:center;padding:12px;background:var(--paper);border-radius:var(--radius-sm);border:1px solid var(--line)">
          <div style="font-size:24px;font-weight:700;font-family:var(--serif);color:var(--gold)">${Math.max(...state.examAttempts.map(a=>a.correct))}<span style="font-size:14px;opacity:.5;font-weight:400">/${EXAM_QUESTION_COUNT}</span></div>
          <div style="font-size:10px;color:var(--ink-soft);font-family:var(--mono);text-transform:uppercase;margin-top:2px">Cel mai bun</div>
        </div>
      </div>
    </div>`:''}
    <div class="card">
      <div class="card-header">Performanță pe secțiuni</div>
      <div class="sec-stats" id="secStats"></div>
    </div>
    ${recent.length>0?`<div class="card" style="margin-top:16px">
      <div class="card-header">Istoric</div>
      ${recent.map(h=>`<div class="history-item">
        <div class="hleft">
          ${h.type==='exam'?'<span class="hbadge">🎓</span>':h.type==='section'?'<span class="hbadge" style="background:var(--blue-bg);color:var(--blue)">'+h.label.replace('Secțiunea ','')+'</span>':'<span class="hbadge" style="background:var(--green-bg);color:var(--green)">T</span>'}
          <span class="hname">${h.type==='exam'?'Simulare':h.label}</span>
        </div>
        <span class="hscore">${h.correct}/${h.total} (${Math.round((h.correct/h.total)*100)}%)</span>
      </div>`).join('')}
    </div>`:''}
    `}
  `;
  app.querySelector('#backBtn').onclick=goHome;

  if(all.length>0){
    const secEl=app.querySelector('#secStats');
    SECTIONS.forEach(s=>{
      const d=sData[s.code];
      const p=d.total>0?Math.round((d.correct/d.total)*100):0;
      if(d.total>0){
        const div=document.createElement('div');div.className='sec-stat-row';
        div.innerHTML='<span class="slabel">'+s.code+'</span><div class="sbar"><div class="sbar-fill" style="width:'+p+'%"></div></div><span class="spct">'+d.correct+'/'+d.total+'</span>';
        secEl.appendChild(div);
      }
    });
    if(secEl.children.length===0) secEl.innerHTML='<div style="font-size:13px;color:var(--ink-soft)">Folosește "Antrenament pe secțiuni" pentru statistici detaliate.</div>';
  }
}

// --- Init ---
render();
</script>
</body>
</html>
