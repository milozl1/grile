<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#F2EEE2" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#161B2B" media="(prefers-color-scheme: dark)">
<title>Teste grilă — Licență 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,500;8..60,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --paper:#F2EEE2;
  --paper-card:#FBF9F3;
  --ink:#1E2A44;
  --ink-soft:#4C5670;
  --line:#D8D2C0;
  --gold:#B8912B;
  --gold-soft:#EFE2BC;
  --green:#2E6B4E;
  --green-bg:#E1EEE4;
  --red:#AC3B2E;
  --red-bg:#F5E1DD;
  --mono:'IBM Plex Mono',monospace;
  --serif:'Source Serif 4',Georgia,serif;
  --sans:'Inter',-apple-system,sans-serif;
  --radius:12px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
[data-theme=dark]{
  --paper:#161B2B;
  --paper-card:#1E2740;
  --ink:#E8E4D8;
  --ink-soft:#9DA3B5;
  --line:#2E3854;
  --gold:#D4A843;
  --gold-soft:#2E2A1A;
  --green:#4CAF7A;
  --green-bg:#1A2E22;
  --red:#E06050;
  --red-bg:#2E1A18;
}
html{height:100%;-webkit-tap-highlight-color:transparent}
body{
  margin:0;min-height:100%;background:var(--paper);color:var(--ink);
  font-family:var(--sans);-webkit-font-smoothing:antialiased;
  transition:background .25s ease,color .25s ease;
}
#app{
  max-width:760px;margin:0 auto;padding:24px 16px calc(80px + var(--safe-bottom));
  animation:fadeIn .2s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.animate{animation:slideUp .25s ease forwards;opacity:0}
.animate:nth-child(1){animation-delay:0s}
.animate:nth-child(2){animation-delay:.06s}
.animate:nth-child(3){animation-delay:.12s}
.animate:nth-child(4){animation-delay:.18s}
.animate:nth-child(5){animation-delay:.24s}
.animate:nth-child(6){animation-delay:.30s}

/* Header */
.top-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 0 16px;
}
.top-bar h2{
  font-family:var(--serif);font-size:20px;font-weight:600;color:var(--ink);
}
.btn-icon{
  width:44px;height:44px;display:flex;align-items:center;justify-content:center;
  border:none;background:var(--paper-card);color:var(--ink-soft);font-size:20px;
  border-radius:50%;cursor:pointer;transition:all .15s ease;border:1px solid var(--line);
}
.btn-icon:hover,.btn-icon:focus-visible{color:var(--ink);border-color:var(--ink-soft)}

/* Cards */
.card{
  background:var(--paper-card);border:1px solid var(--line);border-radius:var(--radius);
  padding:24px;position:relative;transition:background .25s ease,border-color .25s ease;
  animation:scaleIn .2s ease;
}
.eyebrow{
  font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;
  color:var(--gold);margin:0 0 6px;
}
h1{
  font-family:var(--serif);font-weight:600;font-size:28px;margin:0 0 6px;color:var(--ink);
  line-height:1.2;
}
.sub{
  color:var(--ink-soft);font-size:15px;line-height:1.5;margin:0 0 24px;max-width:52ch;
}

/* Home menu */
.home-menu{display:flex;flex-direction:column;gap:12px}
.menu-btn{
  display:flex;align-items:center;gap:16px;
  padding:18px 20px;border:1.5px solid var(--line);border-radius:var(--radius);
  background:var(--paper-card);cursor:pointer;transition:all .15s ease;text-align:left;
  width:100%;font-family:var(--sans);
}
.menu-btn:hover,.menu-btn:focus-visible{border-color:var(--gold);transform:translateX(4px)}
.menu-btn .icon{
  width:44px;height:44px;border-radius:12px;display:flex;align-items:center;
  justify-content:center;font-size:20px;flex-shrink:0;
  background:var(--gold-soft);color:var(--gold);transition:background .25s ease;
}
.menu-btn .mtitle{font-weight:600;font-size:15px;color:var(--ink);margin-bottom:2px}
.menu-btn .mdesc{font-size:13px;color:var(--ink-soft)}

/* Toggle row in card */
.toggle-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 0;border-top:1px solid var(--line);margin-top:8px;
}
.toggle-row .ttitle{font-size:14px;font-weight:500}
.toggle-row .tdesc{font-size:12px;color:var(--ink-soft);margin-top:2px}

/* Switch */
.switch{position:relative;width:44px;height:26px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0}
.slider-el{
  position:absolute;inset:0;background:var(--line);border-radius:26px;
  cursor:pointer;transition:background .2s ease;
}
.slider-el::before{
  content:"";position:absolute;width:20px;height:20px;left:3px;top:3px;
  background:#fff;border-radius:50%;transition:transform .2s ease;
}
input:checked+.slider-el{background:var(--gold)}
input:checked+.slider-el::before{transform:translateX(18px)}

/* Section picker */
.sec-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.sec-card{
  padding:16px;border:1.5px solid var(--line);border-radius:var(--radius);
  cursor:pointer;transition:all .15s ease;text-align:center;background:var(--paper-card);
}
.sec-card:hover{border-color:var(--ink-soft)}
.sec-card.active{border-color:var(--gold);background:var(--gold-soft)}
.sec-card .sec-code{
  font-family:var(--mono);font-weight:600;font-size:18px;color:var(--gold);
}
.sec-card .sec-name{font-size:11px;color:var(--ink-soft);margin-top:4px}
.range-row{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.range-row label{font-size:13px;font-weight:500;white-space:nowrap}
input[type=range]{flex:1;accent-color:var(--gold);height:6px;cursor:pointer}
.rangeval{font-family:var(--mono);font-weight:600;font-size:14px;min-width:36px;text-align:right}

/* Test list */
.test-list{display:flex;flex-direction:column;gap:8px}
.test-opt{
  display:flex;align-items:center;gap:14px;
  padding:16px;border:1.5px solid var(--line);border-radius:var(--radius);
  cursor:pointer;transition:all .15s ease;background:var(--paper-card);
}
.test-opt:hover{border-color:var(--ink-soft)}
.test-opt .tnum{
  font-family:var(--mono);font-weight:600;font-size:16px;color:var(--gold);
  min-width:40px;
}
.test-opt .tinfo .ttitle{font-weight:600;font-size:14px;color:var(--ink)}
.test-opt .tinfo .tdesc{font-size:12px;color:var(--ink-soft);margin-top:2px}
.test-opt .check{
  margin-left:auto;width:24px;height:24px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
}
.test-opt .check.done{background:var(--green);color:#fff;font-size:13px}

/* Buttons */
button{font-family:var(--sans);-webkit-tap-highlight-color:transparent}
.btn-primary{
  width:100%;padding:16px;background:var(--ink);color:var(--paper-card);
  border:none;border-radius:var(--radius);font-size:15px;font-weight:600;
  cursor:pointer;transition:opacity .15s ease,transform .1s ease;
}
.btn-primary:active{transform:scale(.98)}
.btn-primary:hover{opacity:.88}
.btn-primary:disabled{opacity:.4;cursor:default}
.btn-secondary{
  width:100%;padding:14px;background:transparent;color:var(--ink);
  border:1.5px solid var(--line);border-radius:var(--radius);font-size:14px;
  font-weight:500;cursor:pointer;transition:all .15s ease;display:flex;
  align-items:center;justify-content:center;gap:8px;
}
.btn-secondary:hover{border-color:var(--ink-soft)}
.btn-small{
  padding:10px 16px;border:1.5px solid var(--line);border-radius:8px;
  background:transparent;color:var(--ink-soft);font-size:13px;font-weight:500;
  cursor:pointer;transition:all .15s ease;font-family:var(--sans);
}
.btn-small:hover{border-color:var(--ink-soft);color:var(--ink)}

/* Quiz */
.quiz-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px}
.quiz-top .qmeta{font-family:var(--mono);font-size:11px;color:var(--ink-soft)}
.quiz-top .qscore{font-family:var(--mono);font-size:11px;color:var(--ink-soft)}
.progress-track{
  height:4px;background:var(--line);border-radius:2px;overflow:hidden;margin-bottom:16px;
}
.progress-fill{height:100%;background:var(--gold);transition:width .3s ease}

/* Palette dots */
.palette{display:flex;gap:4px;margin-bottom:16px;overflow-x:auto;padding:4px 0}
.palette-dot{
  width:20px;height:20px;border-radius:4px;border:1.5px solid var(--line);
  flex-shrink:0;cursor:pointer;transition:all .15s ease;position:relative;
  display:flex;align-items:center;justify-content:center;
}
.palette-dot.current{border-color:var(--gold)}
.palette-dot.answered{border-color:var(--ink-soft);background:var(--ink-soft)}
.palette-dot.answered.wrong{border-color:var(--red);background:var(--red)}
.palette-dot.answered.correct{border-color:var(--green);background:var(--green)}

.qid{font-family:var(--mono);font-size:11px;color:var(--gold);margin-bottom:8px;letter-spacing:.04em}
.qtext{
  font-family:var(--serif);font-size:17px;line-height:1.55;
  white-space:pre-wrap;margin:0 0 20px;color:var(--ink);
}
.qtext code,.code-block{
  font-family:var(--mono);font-size:13px;background:var(--line);
  display:block;padding:10px 12px;border-radius:6px;margin:10px 0;white-space:pre-wrap;
}
.multi-hint{font-size:12px;color:var(--ink-soft);font-style:italic;margin:-12px 0 14px}

/* Options */
.opts{display:flex;flex-direction:column;gap:10px}
.opt{
  display:flex;align-items:flex-start;gap:14px;
  padding:14px 16px;border:1.5px solid var(--line);border-radius:var(--radius);
  cursor:pointer;background:var(--paper-card);transition:all .15s ease;
  min-height:56px;
}
.opt:hover:not(.locked):not(.disabled){border-color:var(--ink-soft)}
.opt:active:not(.locked){transform:scale(.99)}
.opt .bubble{
  flex-shrink:0;width:28px;height:28px;border-radius:50%;
  border:1.5px solid var(--ink-soft);display:flex;align-items:center;
  justify-content:center;font-family:var(--mono);font-size:13px;font-weight:600;
  color:var(--ink-soft);transition:all .15s ease;margin-top:1px;
}
.opt.selected .bubble{background:var(--ink);border-color:var(--ink);color:var(--paper-card)}
.opt.correct{border-color:var(--green);background:var(--green-bg)}
.opt.correct .bubble{background:var(--green);border-color:var(--green);color:#fff}
.opt.incorrect{border-color:var(--red);background:var(--red-bg)}
.opt.incorrect .bubble{background:var(--red);border-color:var(--red);color:#fff}
.opt.missed{border-color:var(--green);border-style:dashed}
.opt-text{font-size:14px;line-height:1.45;padding-top:2px;flex:1}

/* Feedback */
.feedback{
  margin-top:16px;padding:14px 16px;border-radius:var(--radius);
  font-size:14px;line-height:1.5;animation:slideUp .2s ease;
}
.feedback.ok{background:var(--green-bg);color:var(--green)}
.feedback.bad{background:var(--red-bg);color:var(--red)}

.actions{display:flex;gap:10px;margin-top:16px}
.actions button{flex:1}

/* Results */
.score-hero{text-align:center;padding:16px 0 4px}
.score-num{font-family:var(--serif);font-size:52px;font-weight:600;color:var(--ink)}
.score-label{font-size:12px;color:var(--ink-soft);font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em}
.breakdown{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin:20px 0}
.bd-item{background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:12px 14px}
.bd-item .bname{font-size:11px;color:var(--ink-soft);font-family:var(--mono);margin-bottom:4px}
.bd-item .bscore{font-size:18px;font-weight:600}
.review-item{border-top:1px solid var(--line);padding:16px 0}
.review-item:first-child{border-top:none}
.review-q{font-family:var(--serif);font-size:14px;margin:0 0 8px;white-space:pre-wrap}
.review-line{font-size:13px;margin:2px 0}
.review-line.correct-ans{color:var(--green)}
.review-line.wrong-ans{color:var(--red)}

/* Stats */
.stat-card{padding:16px;text-align:center;border:1px solid var(--line);border-radius:var(--radius);background:var(--paper)}
.stat-card .stat-num{font-family:var(--serif);font-size:32px;font-weight:600;color:var(--ink)}
.stat-card .stat-label{font-size:11px;color:var(--ink-soft);font-family:var(--mono);text-transform:uppercase;margin-top:2px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.section-stats{display:flex;flex-direction:column;gap:8px}
.section-stat{display:flex;align-items:center;gap:12px;padding:10px 12px}
.section-stat .sname{font-size:12px;font-weight:500;min-width:30px}
.section-stat .sbar{flex:1;height:8px;background:var(--line);border-radius:4px;overflow:hidden}
.section-stat .sbar-fill{height:100%;background:var(--gold);border-radius:4px;transition:width .3s ease}
.section-stat .spct{font-family:var(--mono);font-size:11px;color:var(--ink-soft);min-width:36px;text-align:right}

.history-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 0;border-top:1px solid var(--line);
}
.history-item .hname{font-size:13px;font-weight:500}
.history-item .hscore{font-family:var(--mono);font-size:13px}

/* Timer */
.timer-bar{
  display:flex;align-items:center;justify-content:center;gap:6px;
  font-family:var(--mono);font-size:12px;color:var(--ink-soft);padding:4px 0 12px;
}

/* Swipe zone */
.swipe-zone{position:relative}

/* Empty state */
.empty-state{text-align:center;padding:32px 16px;color:var(--ink-soft);font-size:14px}

/* Responsive */
@media(max-width:480px){
  #app{padding:16px 12px calc(70px + var(--safe-bottom))}
  h1{font-size:24px}
  .card{padding:18px}
  .qtext{font-size:16px}
  .score-num{font-size:42px}
  .menu-btn{padding:14px 16px}
  .opt{padding:12px 14px;min-height:50px}
  .sec-grid{grid-template-columns:1fr 1fr;gap:8px}
  .sec-card{padding:14px}
  .stats-grid{grid-template-columns:1fr 1fr;gap:8px}
}
@media(min-width:481px){
  .sec-grid{grid-template-columns:repeat(4,1fr)}
}
</style>
</head>

const QUESTIONS = [{"id": "A.1", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Ce anume se specifică prin tipul unei date?", "opts": {"a": "numai numărul de octeți ocupați;", "b": "numai spațiul necesar reprezentării și modul de reprezentare;", "c": "numai operațiile permise."}, "ans": ["b"]}, {"id": "A.2", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Ce este o variabilă?", "opts": {"a": "litera care ține locul unor valori (de exemplu a, b, c sau x, y, z);", "b": "o valoare care se schimbă;", "c": "o zonă de memorie identificabilă în care se pot păstra valori."}, "ans": ["c"]}, {"id": "A.3", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Ce caracteristică a unei variabile este precizată de clasa sa de memorare?", "opts": {"a": "locul unde poate fi folosită;", "b": "locul unde se creează;", "c": "locul unde este memorată."}, "ans": ["b"]}, {"id": "A.4", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Domeniul identificatorilor de variabile globale ține din locul declarației până la:", "opts": {"a": "sfârșitul blocului;", "b": "sfârșitul programului;", "c": "sfârșitul textului sursă."}, "ans": ["c"]}, {"id": "A.5", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Durata de viață a variabilelor globale este:", "opts": {"a": "cât timp sunt utilizate;", "b": "câteva minute;", "c": "cât durează execuția programului."}, "ans": ["c"]}, {"id": "A.6", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Durata de viață a variabilelor locale este:", "opts": {"a": "cât timp sunt utilizate;", "b": "cât durează execuția subprogramului;", "c": "depinde de clasa lor de memorare."}, "ans": ["c"]}, {"id": "A.7", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Care din următorii operatori admit operanzi reali?", "opts": {"a": "operatorii de incrementare/decrementare", "b": "operatorii logici", "c": "operatorii logici pe biți", "d": "operatorii de deplasare"}, "ans": ["a", "b"]}, {"id": "A.8", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Când au loc conversii implicite de tip?", "opts": {"a": "la citirea datelor de intrare respectiv la afișarea rezultatelor;", "b": "când operanzii unei expresii au tipuri diferite;", "c": "când argumentul actual cu care se apelează o funcție are alt tip decât argumentul formal corespunzător."}, "ans": ["b", "c"]}, {"id": "A.9", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Se consideră șirul lui Fibonacci dat de relația de recurență F0=0, F1=1 și Fn+1=Fn+Fn-1. De câte ori este evaluat F2 pentru a calcula F5 în cazul calculului termenului Fn în mod recursiv?", "opts": {"a": "de 3 ori", "b": "o dată", "c": "de 4 ori"}, "ans": ["a"]}, {"id": "A.10", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Care este rezultatul numeric al evaluării unei expresii relaționale sau logice?", "opts": {"a": "FALSE sau TRUE;", "b": "0 sau 1;", "c": "0 sau diferit de 0."}, "ans": ["b"]}, {"id": "A.11", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Dacă a=-2, b=-1 și c=0, care este rezultatul numeric al evaluării expresiei a<b<c?", "opts": {"a": "1;", "b": "depinde de declarația de tip a variabilelor a, b, c;", "c": "0."}, "ans": ["c"]}, {"id": "A.12", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Care dintre următoarele afirmații este/sunt adevărată/adevărate pentru algoritmul corespunzător funcției de mai jos (se consideră că a este un tablou unidimensional cu n elemente)?\ndef transform(a):\n    n=len(a)\n    for i in range(0,n-1):\n        if (a[i]<a[i+1]):\n            a[i], a[i+1] = a[i+1], a[i]\n    return(a)", "opts": {"a": "Algoritmul sortează descrescător tabloul a", "b": "După aplicarea algoritmului, tabloul a satisface proprietatea a[i] ≥ a[n-1] pentru 0≤i<n", "c": "Algoritmul sortează crescător tabloul a", "d": "După aplicarea algoritmului, tabloul a satisface proprietatea a[i] ≤ a[n-1] pentru 0≤i<n"}, "ans": ["b"]}, {"id": "A.13", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Fie declarațiile: int x=10, y=20. Care este valoarea expresiei !x-y?", "opts": {"a": "0;", "b": "-10;", "c": "-20."}, "ans": ["c"]}, {"id": "A.14", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Fie declarațiile: int x=8, y=20. Care este valoarea expresiei x--/++y?", "opts": {"a": "0;", "b": "3;", "c": "0.399875."}, "ans": ["a"]}, {"id": "A.15", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Care din următoarele variante reprezintă modalități de comunicare între funcții?", "opts": {"a": "prin argumentele actuale;", "b": "prin valoarea returnata;", "c": "prin variabile globale."}, "ans": ["a", "b", "c"]}, {"id": "A.16", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Ce este contextul de apel al unei funcții?", "opts": {"a": "lista argumentelor formale;", "b": "o zonă de memorie (stivă);", "c": "instrucțiunile (definiția funcției)."}, "ans": ["b"]}, {"id": "A.17", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Care din următoarele acțiuni au loc la compilarea unui fișier sursă în C?", "opts": {"a": "analiza lexicală", "b": "includerea fișierelor header", "c": "analiza sintactica", "d": "generarea codului obiect", "e": "editarea de legături"}, "ans": ["a", "c", "d"]}, {"id": "A.18", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Transmiterea argumentelor către funcția apelată (convenția de apel C) se face:", "opts": {"a": "prin variabile globale;", "b": "prin valoare;", "c": "în ordine inversă celei din lista de argumente."}, "ans": ["b", "c"]}, {"id": "A.19", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Ce este o funcție recursivă?", "opts": {"a": "o funcție care recurge la context;", "b": "o funcție cu lista variabilă de argumente;", "c": "o funcție care se autoapelează."}, "ans": ["c"]}, {"id": "A.20", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Ce este un pointer?", "opts": {"a": "un indicator;", "b": "o adresă de memorie;", "c": "o variabilă a cărei valoare se interpretează ca adresă."}, "ans": ["c"]}, {"id": "A.21", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Cât spațiu de memorie ocupă o variabilă structură:", "opts": {"a": "cât spațiu ocupă de cel mai \"voluminos\" dintre membri;", "b": "egal cu suma spațiilor necesare membrilor;", "c": "cel puțin cât suma spațiilor necesare membrilor."}, "ans": ["c"]}, {"id": "A.22", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Care din afirmațiile următoare, referitoare la structuri, sunt adevărate:", "opts": {"a": "sunt tipuri de date agregate;", "b": "sunt tipuri de date definite de programator;", "c": "sunt tipuri de date predefinite."}, "ans": ["a", "b"]}, {"id": "A.23", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Care din următoarele operații sunt legale:", "opts": {"a": "returnarea unei structuri ca valoare a unei funcții;", "b": "adunarea a două structuri;", "c": "copierea unei structuri."}, "ans": ["a", "c"]}, {"id": "A.24", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "În care dintre următoarele prelucrări repetitive este posibil să nu se efectueze niciodată corpul ciclului?", "opts": {"a": "FOR;", "b": "REPEAT;", "c": "WHILE."}, "ans": ["a", "c"]}, {"id": "A.25", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Într-o prelucrare repetitivă cu contor (de tip FOR) ordinea efectuării operațiilor este:", "opts": {"a": "inițializare, modificare contor, corp ciclu, testare;", "b": "inițializare, testare, corp ciclu, modificare contor;", "c": "inițializare, corp ciclu, modificare contor, testare."}, "ans": ["b"]}, {"id": "A.26", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Care dintre următoarele afirmații sunt adevărate pentru o prelucrare repetitivă de tip WHILE?", "opts": {"a": "se începe cu verificarea condiției;", "b": "corpul ciclului se execută cel puțin o dată;", "c": "este posibil să nu se execute nici o dată corpul ciclului."}, "ans": ["a", "c"]}, {"id": "A.27", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Efectul execuției următoarelor secvențe:\nfor(exp_1; exp_2; exp_3)\n  instrucțiune;\nversus\nexp_1;\nwhile(exp_2)\n{ instrucțiune;\n  exp_3; }\neste:", "opts": {"a": "identic;", "b": "diferit;", "c": "dependent de context."}, "ans": ["a"]}, {"id": "A.28", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Se consideră secvența în pseudocod:\na=3\nREPEAT\n  a=a*a\nUNTIL a=n\nPentru ce valori ale lui n ciclul de mai sus nu este infinit?", "opts": {"a": "pentru orice valoare naturală multiplu de 3;", "b": "pentru orice valoare naturală care este pătratul unui multiplu de 3;", "c": "pentru orice putere a lui 3 al cărui exponent este o putere a lui 2."}, "ans": ["c"]}, {"id": "A.29", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Fie x[1..n] un tablou cu elemente întregi și secvența în pseudocod:\nFOR i=1, m, +1 DO\n  a=x[i]\n  x[i]=x[n-i+1]\n  x[n-i+1]=a\nENDFOR\nCe valoare ar trebui să aibă m astfel încât efectul secvenței de mai sus să fie inversarea ordinii elementelor tabloului și numărul de interschimbări să fie cât mai mic?", "opts": {"a": "n;", "b": "n DIV 2;", "c": "3n DIV 2."}, "ans": ["b"]}, {"id": "A.30", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Se consideră secvența în pseudocod:\nFOR i=1,n,+ DO\n  FOR j=i+1,n,+1 DO\n    WRITE (i,j)\n  ENDFOR\nENDFOR\nPrin execuția prelucrărilor de mai sus se vor afișa:", "opts": {"a": "toate perechile de forma (i,j) cu 1≤i≤n și 1≤j≤n;", "b": "toate perechile de forma (i,j) cu 1≤i≤n și 1≤j≤n și i<j;", "c": "toate perechile de forma (i,j) cu 1≤i≤n și 1≤j≤n și i≤j."}, "ans": ["c"]}, {"id": "A.31", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Fie x[1..n] un tablou cu elemente reale. Se consideră secvența în pseudocod:\nFOR i=1,n-1,1 DO\n  IF x[i]>x[i+1] THEN\n    aux=x[i]\n    x[i]=x[i+1]\n    x[i+1]=aux\n  ENDIF\nENDFOR\nCe efect are secvența de prelucrări asupra tabloului x?", "opts": {"a": "ordonează crescător elementele lui x;", "b": "aduce cea mai mare valoare pe ultima poziție din tablou;", "c": "inversează ordinea elementelor tabloului."}, "ans": ["b"]}, {"id": "A.32", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "La adunarea a două matrice a[1..m,1..n] și b[1..m,1..n] numărul de operații de adunare efectuate asupra elementelor este:", "opts": {"a": "m+n;", "b": "m*n;", "c": "max{m,n}."}, "ans": ["b"]}, {"id": "A.33", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "La înmulțirea a două matrice a[1..m,1..n] și b[1..n,1..p] numărul de operații de înmulțire efectuate este:", "opts": {"a": "m+n+p;", "b": "m*n+n*p;", "c": "m*n*p."}, "ans": ["c"]}, {"id": "A.34", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Componentele unei structuri de date:", "opts": {"a": "pot fi la rândul lor structuri de date;", "b": "pot fi toate de același tip;", "c": "pot avea unul din tipurile standard ale limbajului de programare utilizat."}, "ans": ["a", "b", "c"]}, {"id": "A.35", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Următoarea structură de date:\nstruct genealogie {\n  char numepren[20];\n  struct genealogie mama, tata;\n};", "opts": {"a": "nu este o structură recursivă;", "b": "este o descriere greșită în limbajul \"C\" a structurii genealogie;", "c": "este descrierea, în limbajul \"C\", utilizată în practică pentru a descrie structura de arbore genealogic al unei persoane."}, "ans": ["b"]}, {"id": "A.36", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "O structură dinamică de date este o structură de date care:", "opts": {"a": "se generează pe parcursul prelucrării;", "b": "este fixă ca formă și dimensiune;", "c": "în momentul compilării nu este cunoscut spațiul de memorie necesar ce urmează a-i fi alocat."}, "ans": ["a", "c"]}, {"id": "A.37", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Un fișier:", "opts": {"a": "este o structură externă de date;", "b": "este o colecție de date pe care s-a definit o anumită structură și căreia îi este specific un anumit mecanism de selecție și identificare;", "c": "este o colecție omogenă de date din punctul de vedere al semnificației și al cerințelor de prelucrare, depusă pe un suport extern de memorare."}, "ans": ["a", "b", "c"]}, {"id": "A.38", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Modul de acces la înregistrările unui fișier poate fi, în funcție de modul de organizare:", "opts": {"a": "aleator;", "b": "secvențial;", "c": "direct."}, "ans": ["b", "c"]}, {"id": "A.39", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Dacă într-un fișier înregistrările sunt depuse în mod continuu pe suport (în locații succesive), în ordinea în care sunt furnizate înregistrările, se spune că fișierul este de organizare:", "opts": {"a": "aleatoare;", "b": "secvențială;", "c": "relativă."}, "ans": ["b"]}, {"id": "A.40", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Dacă într-un fișier informația este depusă pe suport în funcție de valoarea unui câmp cheie, se spune că fișierul este de organizare:", "opts": {"a": "aleatoare;", "b": "secvențială;", "c": "relativă."}, "ans": ["a"]}, {"id": "A.41", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Se numește listă liniară:", "opts": {"a": "structura de date în care inserările, suprimările și orice alt acces se efectuează la unul din capetele listei;", "b": "o colecție de n≥0 elemente de același tip, ale căror proprietăți structurale se reduc la pozițiile relative liniare (unidimensionale) ale elementelor în cadrul structurii;", "c": "o structură de date asimilată cu un tablou în care elementele sunt memorate într-o zonă continuă de memorie, în locații succesive."}, "ans": ["b"]}, {"id": "A.42", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "O listă liniară simplu înlănțuită este:", "opts": {"a": "lista liniară, în care relația de ordonare este materializată pe suport printr-un pointer către elementul următor;", "b": "o structură de date implementată prin tipul tablou;", "c": "o structură explicită și recursivă."}, "ans": ["a", "c"]}, {"id": "A.43", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Algoritmul de sortare rapidă este cel mai potrivit pentru:", "opts": {"a": "sortarea unei liste mari cu elemente aleatoare", "b": "sortarea unei liste aproape ordonate", "c": "sortarea unei liste scurte", "d": "nu este potrivit pentru nici un fel de sortare"}, "ans": ["a"]}, {"id": "A.44", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "O stivă este:", "opts": {"a": "listă liniară în care inserările se fac la un capăt al listei și suprimările la celălalt capăt al listei;", "b": "o listă liniară de tipul LIFO (Last In First Out);", "c": "o listă liniară în care se manipulează mereu elementul cel mai recent introdus."}, "ans": ["b", "c"]}, {"id": "A.45", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Care din afirmațiile următoare sunt greșite:", "opts": {"a": "stiva este o listă în care inserările, suprimările și orice alt acces se efectuează la un singur capăt numit vârf;", "b": "o stivă poate fi implementată fie static folosind tipul tablou, fie dinamic folosind tipul pointer;", "c": "o stivă este o listă de tip FIFO (First In First Out)."}, "ans": ["c"]}, {"id": "A.46", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "O structură de date de tip coadă este:", "opts": {"a": "structură de tip listă cu restricție la intrare;", "b": "o listă liniară de tipul FIFO (First In First Out);", "c": "o listă liniară în care inserările se efectuează la un capăt al listei, iar suprimările se efectuează la celălalt capăt al listei."}, "ans": ["b", "c"]}, {"id": "A.47", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "În cazul unei structuri de date de tip arbore:", "opts": {"a": "fiecare nod este subordonat direct unui alt nod;", "b": "fiecare nod este subordonat direct unui nod numit rădăcină;", "c": "fiecare nod, cu excepția nodului rădăcină, este subordonat direct unui alt nod."}, "ans": ["c"]}, {"id": "A.48", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Care din următoarele afirmații sunt adevărate:", "opts": {"a": "gradul maxim al nodurilor unui arbore se numește gradul arborelui;", "b": "numărul fiilor unui nod se numește gradul nodului;", "c": "un nod care nu are fii se numește nod terminal sau frunză."}, "ans": ["a", "b", "c"]}, {"id": "A.49", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Un arbore binar este perfect echilibrat:", "opts": {"a": "dacă nodurile terminale sunt doar pe ultimul nivel;", "b": "dacă nodurile terminale sunt doar pe ultimele două niveluri;", "c": "dacă numărul de noduri din subarborele stâng diferă de numărul de noduri din subarborele drept, cu cel mult 1."}, "ans": ["c"]}, {"id": "A.50", "sec": "A", "secName": "Algoritmi. Programare. Structuri de date", "text": "Într-un arbore adâncimea unui nod este:", "opts": {"a": "egală cu lungimea celui mai lung drum de la nodul respectiv la un nod terminal;", "b": "egală cu înălțimea arborelui;", "c": "egală cu lungimea drumului unic de la rădăcină la acel nod."}, "ans": ["c"]}, {"id": "BD.1", "sec": "BD", "secName": "Baze de Date", "text": "Printr-o bază de date se înțelege:", "opts": {"a": "un fișier cu date;", "b": "colecție de informații stocate astfel încât să poată fi regăsite, modificate sau șterse;", "c": "un tabel cu înregistrări."}, "ans": ["b"]}, {"id": "BD.2", "sec": "BD", "secName": "Baze de Date", "text": "Principalele funcții ale unui SGBD sunt:", "opts": {"a": "stocarea, regăsirea și actualizarea datelor;", "b": "facilitează accesul simultan al mai multor utilizatori;", "c": "securizarea datelor prin parolare."}, "ans": ["a", "b", "c"]}, {"id": "BD.3", "sec": "BD", "secName": "Baze de Date", "text": "Avantajele accesării datelor printr-un SGBD sunt:", "opts": {"a": "asigurarea integrității datelor;", "b": "reducerea redondanței;", "c": "creșterea securității."}, "ans": ["a", "b", "c"]}, {"id": "BD.4", "sec": "BD", "secName": "Baze de Date", "text": "Limbajele de interogare utilizate în gestiunea BD pot fi:", "opts": {"a": "algebrice;", "b": "logice;", "c": "relaționale."}, "ans": ["a", "b", "c"]}, {"id": "BD.5", "sec": "BD", "secName": "Baze de Date", "text": "Datele stocate într-o bază de date sunt:", "opts": {"a": "scalare;", "b": "vectoriale;", "c": "complexe."}, "ans": ["c"]}, {"id": "BD.6", "sec": "BD", "secName": "Baze de Date", "text": "O colecție de date reprezintă:", "opts": {"a": "un set de date scalare;", "b": "un ansamblu de date omogene;", "c": "un vector."}, "ans": ["b"]}, {"id": "BD.7", "sec": "BD", "secName": "Baze de Date", "text": "Între două colecții de date se poate stabili:", "opts": {"a": "o corespondență;", "b": "o relație de subsidiaritate;", "c": "o relație de recurență."}, "ans": ["a"]}, {"id": "BD.8", "sec": "BD", "secName": "Baze de Date", "text": "Corespondența între două colecții poate fi:", "opts": {"a": "una la una;", "b": "una la mai multe;", "c": "mai multe la mai multe."}, "ans": ["a", "b", "c"]}, {"id": "BD.9", "sec": "BD", "secName": "Baze de Date", "text": "Relația între două colecții poate fi:", "opts": {"a": "nondirecțională;", "b": "unidirecțională;", "c": "bidirecțională."}, "ans": ["a", "b", "c"]}, {"id": "BD.10", "sec": "BD", "secName": "Baze de Date", "text": "O colecție de date poate fi legată printr-o relație de:", "opts": {"a": "doar de o singură altă colecție;", "b": "mai multe alte colecții;", "c": "nici una, una sau mai multe colecții."}, "ans": ["c"]}, {"id": "BD.11", "sec": "BD", "secName": "Baze de Date", "text": "O structură de date reprezintă:", "opts": {"a": "o colecție de date complexe;", "b": "o colecție de date scalare;", "c": "o colecție de date cu un mecanism de localizare."}, "ans": ["c"]}, {"id": "BD.12", "sec": "BD", "secName": "Baze de Date", "text": "Mecanismul de accesare al datelor poate fi:", "opts": {"a": "relațional;", "b": "secvențial;", "c": "direct."}, "ans": ["a", "b", "c"]}, {"id": "BD.13", "sec": "BD", "secName": "Baze de Date", "text": "O structură tabelară este divizibilă în:", "opts": {"a": "înregistrări;", "b": "câmpuri;", "c": "predicate."}, "ans": ["a", "b"]}, {"id": "BD.14", "sec": "BD", "secName": "Baze de Date", "text": "O bază de date relațională conține:", "opts": {"a": "un tabel conducător (rădăcină);", "b": "o structură arborescentă de tabele;", "c": "un set de reguli de fidelitate."}, "ans": ["b"]}, {"id": "BD.15", "sec": "BD", "secName": "Baze de Date", "text": "E.F.Codd a definit treisprezece reguli de fidelitate pentru:", "opts": {"a": "clienții bazei de date;", "b": "administratorul bazei de date;", "c": "bazele de date relaționale."}, "ans": ["c"]}, {"id": "BD.16", "sec": "BD", "secName": "Baze de Date", "text": "Limbajul SQL este un limbaj ce permite:", "opts": {"a": "crearea unei baze de date;", "b": "gestionarea datelor;", "c": "interogarea bazelor de date."}, "ans": ["a", "b", "c"]}, {"id": "BD.17", "sec": "BD", "secName": "Baze de Date", "text": "Limbajul SQL conține următoarele subseturi:", "opts": {"a": "Limbaj de definire a datelor;", "b": "Limbaj de manipulare a datelor;", "c": "Limbaj de gestionare a datelor."}, "ans": ["a", "b"]}, {"id": "BD.18", "sec": "BD", "secName": "Baze de Date", "text": "Schema unei baze de date cuprinde:", "opts": {"a": "tabelele, atributele și domeniile acestora;", "b": "restricțiile de integritate;", "c": "drepturile utilizatorilor."}, "ans": ["a", "b"]}, {"id": "BD.19", "sec": "BD", "secName": "Baze de Date", "text": "Limbajul SQL este:", "opts": {"a": "un standard unic;", "b": "un limbaj cu dialecte relativ diferite între ele;", "c": "o familie de limbaje independente fără elemente comune."}, "ans": ["b"]}, {"id": "BD.20", "sec": "BD", "secName": "Baze de Date", "text": "MySQL este:", "opts": {"a": "un mediu de dezvoltare a SGBD relaționale;", "b": "un limbaj de definire a datelor;", "c": "un dialect al SQL."}, "ans": ["c"]}, {"id": "BD.21", "sec": "BD", "secName": "Baze de Date", "text": "MySQL conține instrucțiuni pentru:", "opts": {"a": "definirea datelor;", "b": "programare procedurală;", "c": "programare obiectuală."}, "ans": ["a", "b"]}, {"id": "BD.22", "sec": "BD", "secName": "Baze de Date", "text": "Definirea datelor se face cu sub-limbajul:", "opts": {"a": "DLL;", "b": "DML;", "c": "DDL."}, "ans": ["c"]}, {"id": "BD.23", "sec": "BD", "secName": "Baze de Date", "text": "Există instrucțiuni pentru:", "opts": {"a": "crearea tabelelor;", "b": "definirea câmpurilor;", "c": "delimitarea domeniilor atributelor."}, "ans": ["a", "b", "c"]}, {"id": "BD.24", "sec": "BD", "secName": "Baze de Date", "text": "Protecția unei baze de date împotriva introducerii unor valori eronate se face prin:", "opts": {"a": "controlul permanent al administratorului;", "b": "domenii de inexistență;", "c": "restricții de integritate."}, "ans": ["c"]}, {"id": "BD.25", "sec": "BD", "secName": "Baze de Date", "text": "Ștergerea unei Baze de date este o operație din:", "opts": {"a": "doar sub-limbajul de definire a datelor;", "b": "doar sub-limbajul de manipulare a datelor;", "c": "ambele sub-seturi."}, "ans": ["a"]}, {"id": "BD.26", "sec": "BD", "secName": "Baze de Date", "text": "Declararea atributelor în MySQL se face astfel:", "opts": {"a": "tip_data nume_data;", "b": "tip_data(lungime) nume_data;", "c": "nume_data tip_data(lungime)."}, "ans": ["c"]}, {"id": "BD.27", "sec": "BD", "secName": "Baze de Date", "text": "Dialectul MySQL cuprinde următoarele tipuri de date:", "opts": {"a": "numerice;", "b": "șir;", "c": "dată calendaristică."}, "ans": ["a", "b", "c"]}, {"id": "BD.28", "sec": "BD", "secName": "Baze de Date", "text": "Tipul varchar este:", "opts": {"a": "identic cu char;", "b": "economisește spațiu fiind mai flexibil decât char;", "c": "necesită ZEROFILL."}, "ans": ["b"]}, {"id": "BD.29", "sec": "BD", "secName": "Baze de Date", "text": "Tipul decimal se poate folosi astfel:", "opts": {"a": "decimal(m,d);", "b": "decimal(m);", "c": "decimal."}, "ans": ["a"]}, {"id": "BD.30", "sec": "BD", "secName": "Baze de Date", "text": "Coloana timestamp(12) are formatul:", "opts": {"a": "YYMMDDhhmmss;", "b": "YY-MM-DD hh:mm;", "c": "YYMMDDHHMMSS."}, "ans": ["c"]}, {"id": "BD.31", "sec": "BD", "secName": "Baze de Date", "text": "Crearea unei baze de date se face cu comanda:", "opts": {"a": "CREATE DATABASE;", "b": "CREATE DATABASE nume_bd;", "c": "CREATE DATABASE cale/nume_bd."}, "ans": ["b"]}, {"id": "BD.32", "sec": "BD", "secName": "Baze de Date", "text": "Crearea unui tabel se face cu sintaxa:", "opts": {"a": "CREATE TABLE nume_tab;", "b": "CREATE TABLE nume_tab(lista_nume_cmp);", "c": "CREATE TABLE nume_tab(lista_restrictii)."}, "ans": ["b"]}, {"id": "BD.33", "sec": "BD", "secName": "Baze de Date", "text": "Un tabel poate fi creat:", "opts": {"a": "prin declararea directă a câmpurilor sale;", "b": "prin copierea rezultatelor unei interogări;", "c": "prin indexare."}, "ans": ["a", "b"]}, {"id": "BD.34", "sec": "BD", "secName": "Baze de Date", "text": "Principalele restricții de integritate ale unei coloane sunt:", "opts": {"a": "not null;", "b": "default;", "c": "check out."}, "ans": ["a"]}, {"id": "BD.35", "sec": "BD", "secName": "Baze de Date", "text": "Ștergerea unei baze de date produce eliminarea:", "opts": {"a": "tuturor tabelelor componente;", "b": "directorului corespunzător bazei de date;", "c": "tuplei corespunzătoare bazei de date din SYSDBS."}, "ans": ["a"]}, {"id": "BD.36", "sec": "BD", "secName": "Baze de Date", "text": "Inserarea datelor într-un tabel se face cu instrucțiunile:", "opts": {"a": "INSERT INTO;", "b": "SET;", "c": "LOAD DATA INFILE."}, "ans": ["a", "c"]}, {"id": "BD.37", "sec": "BD", "secName": "Baze de Date", "text": "Instrucțiunea INSERT permite introducerea într-un tabel a:", "opts": {"a": "înregistrărilor complete;", "b": "valorilor unor câmpuri;", "c": "corecturilor."}, "ans": ["a", "b"]}, {"id": "BD.38", "sec": "BD", "secName": "Baze de Date", "text": "Instrucțiunea UPDATE are sintaxa:", "opts": {"a": "SET nume_cp= val/expr WHERE cond;", "b": "UPDATE nume_tab WHERE cond;", "c": "UPDATE nume_tab SET nume_cp= val/expr WHERE cond."}, "ans": ["c"]}, {"id": "BD.39", "sec": "BD", "secName": "Baze de Date", "text": "Instrucțiunea UPDATE poate modifica:", "opts": {"a": "numai un singur câmp dintr-o singură înregistrare;", "b": "mai multe câmpuri dintr-o singură înregistrare;", "c": "mai multe câmpuri din mai multe înregistrări."}, "ans": ["c"]}, {"id": "BD.40", "sec": "BD", "secName": "Baze de Date", "text": "Instrucțiunea DELETE șterge:", "opts": {"a": "înregistrări întregi;", "b": "câmpuri izolate;", "c": "câmpuri adiacente."}, "ans": ["a"]}, {"id": "BD.41", "sec": "BD", "secName": "Baze de Date", "text": "O propoziție SELECT trebuie obligatoriu să conțină:", "opts": {"a": "SELECT;", "b": "FROM;", "c": "WHERE."}, "ans": ["b"]}, {"id": "BD.42", "sec": "BD", "secName": "Baze de Date", "text": "Condițiile WHERE pot conține ca operatori:", "opts": {"a": "AND, OR și NOT;", "b": "=, <>, >, <;", "c": "LIKE, BETWEEN."}, "ans": ["a", "b", "c"]}, {"id": "BD.43", "sec": "BD", "secName": "Baze de Date", "text": "Sortarea descendentă a înregistrărilor se face cu:", "opts": {"a": "SELECT lista_cmp ORDER BY cmp_ord DESC;", "b": "SELECT lista_cmp WHERE cond SORT cmp_ord DESC;", "c": "SELECT lista_cmp FROM lista_tab WHERE cond."}, "ans": ["a"]}, {"id": "BD.44", "sec": "BD", "secName": "Baze de Date", "text": "Eliminarea duplicatelor se poate face cu:", "opts": {"a": "SELECT UNIQUE;", "b": "SELECT DISTINCT;", "c": "WHERE UNIQUE."}, "ans": ["b"]}, {"id": "BD.45", "sec": "BD", "secName": "Baze de Date", "text": "Clauza ORDER BY se poate folosi împreună cu:", "opts": {"a": "ASC;", "b": "DESC;", "c": "LIMIT."}, "ans": ["a", "b", "c"]}, {"id": "BD.46", "sec": "BD", "secName": "Baze de Date", "text": "O propoziție SELECT ce cuprinde mai multe tabele face:", "opts": {"a": "JOIN;", "b": "NATURAL_JOIN;", "c": "RIGHT_JOIN."}, "ans": ["a"]}, {"id": "BD.47", "sec": "BD", "secName": "Baze de Date", "text": "Directiva STRAIGHT_JOIN se plasează în cadrul zonei:", "opts": {"a": "SELECT;", "b": "FROM;", "c": "WHERE."}, "ans": ["b"]}, {"id": "BD.48", "sec": "BD", "secName": "Baze de Date", "text": "Uniunile se folosesc pentru a combina date din:", "opts": {"a": "mai multe câmpuri;", "b": "mai multe tabele;", "c": "mai multe baze de date."}, "ans": ["b"]}, {"id": "BD.49", "sec": "BD", "secName": "Baze de Date", "text": "Uniunile LEFT_JOIN se folosesc pentru:", "opts": {"a": "combinarea unor date din tabele disjuncte;", "b": "combinarea unor date din înregistrări disjuncte;", "c": "evidențierea tuplelor din T1 care nu au corespondent în T2."}, "ans": ["c"]}, {"id": "BD.50", "sec": "BD", "secName": "Baze de Date", "text": "În MySQL se utilizează:", "opts": {"a": "EQUI_JOIN;", "b": "SEMI_JOIN;", "c": "RIGHT_JOIN."}, "ans": ["c"]}, {"id": "J.1", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Dintr-o singură clasă de bază se pot deriva:", "opts": {"a": "Doar o singură clasă fiică;", "b": "Mai multe clase fiică;", "c": "Nu se pot deriva clasele."}, "ans": ["b"]}, {"id": "J.2", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "În Java metodele sunt scrise:", "opts": {"a": "în interiorul declarației clasei din care fac parte;", "b": "în afara declarației clasei din care fac parte;", "c": "Ambele."}, "ans": ["a"]}, {"id": "J.3", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Crearea unui obiect se face prin:", "opts": {"a": "Instanțiere;", "b": "Cu ajutorul unui constructor;", "c": "Prin simpla declarare."}, "ans": ["a", "b"]}, {"id": "J.4", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Instanțierea unui obiect produce:", "opts": {"a": "Rezervarea spațiului în memorie pentru acel obiect;", "b": "Eliminarea clasei utilizate;", "c": "Atribuirea de valori pentru datele membre."}, "ans": ["a", "c"]}, {"id": "J.5", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Clasele dintr-un program pot fi:", "opts": {"a": "Independente;", "b": "Derivate dintr-o clasă de bază;", "c": "Ambele."}, "ans": ["a", "b", "c"]}, {"id": "J.6", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Într-un program scris în limbajul Java se poate afla:", "opts": {"a": "O singură clasă;", "b": "Mai multe clase;", "c": "Nu se pun clasele în program, ci în biblioteci."}, "ans": ["b"]}, {"id": "J.7", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "În limbajul Java tipurile simple de date pot fi definite:", "opts": {"a": "În mod identic cu programele procedurale;", "b": "Sub forma unor clase;", "c": "În ambele moduri."}, "ans": ["a", "b", "c"]}, {"id": "J.8", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "După compilare clasele Java se vor găsi plasate în:", "opts": {"a": "Fișierul Java inițial;", "b": "Un fișier executabil cu extensia \".exe\";", "c": "În fișiere cu extensia \".class\" separate."}, "ans": ["c"]}, {"id": "J.9", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Limbajul Java este independent de platformă fiindcă:", "opts": {"a": "Este pur obiectual;", "b": "Rulează pe o mașină virtuală emulată;", "c": "Nu folosește biblioteci de funcții."}, "ans": ["b"]}, {"id": "J.10", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Pentru scrierea unui applet Java sunt obligatoriu necesare:", "opts": {"a": "Biblioteci de clase Java;", "b": "Editoare de fișiere java și html;", "c": "Un browser compatibil Java."}, "ans": ["b", "c"]}, {"id": "J.11", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Un bloc de testare a apariției unei excepții conține obligatoriu:", "opts": {"a": "Instrucțiunea \"if\";", "b": "Instrucțiunea \"try\";", "c": "Instrucțiunea \"finally\"."}, "ans": ["b"]}, {"id": "J.12", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Limbajul Java permite scrierea de:", "opts": {"a": "Clase de erori proprii;", "b": "Clase de excepții proprii;", "c": "Blocuri de testare multiple."}, "ans": ["a", "b", "c"]}, {"id": "J.13", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "O clasă proprie de excepții se declară:", "opts": {"a": "Cu sintaxa valabilă pentru orice clasă;", "b": "În interiorul unui bloc \"try.catch\";", "c": "Nu se declară."}, "ans": ["a", "b"]}, {"id": "J.14", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Un bloc \"try.catch\" pentru mai multe tipuri de erori cuprinde obligatoriu:", "opts": {"a": "O singură instrucțiune \"try\";", "b": "Câte o instrucțiune \"catch\" pentru fiecare eroare;", "c": "O instrucțiune \"finally\"."}, "ans": ["a", "b"]}, {"id": "J.15", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "O metodă a cărei acțiune poate produce excepții trebuie să fie:", "opts": {"a": "Eliminată din start;", "b": "Modificată pentru a elimina orice risc;", "c": "Declarată ca fiind susceptibilă să facă acest lucru."}, "ans": ["c"]}, {"id": "J.16", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Conceptul de multitasking înseamnă:", "opts": {"a": "Execuția simultană a mai multor sarcini;", "b": "Multiplexarea în timp a sarcinilor de executat;", "c": "Execuția sarcinilor pe mai multe procesoare paralele."}, "ans": ["b"]}, {"id": "J.17", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Un fir de execuție se comportă în timpul rulării ca:", "opts": {"a": "Un bloc al programului;", "b": "Un pachet de clase;", "c": "O aplicație autonomă."}, "ans": ["c"]}, {"id": "J.18", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Un fir intră în execuție atunci când:", "opts": {"a": "Se naște;", "b": "Are prioritate;", "c": "Primește comanda start()."}, "ans": ["b", "c"]}, {"id": "J.19", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Un fir de execuție este blocat dacă primește comanda:", "opts": {"a": "sleep();", "b": "wait();", "c": "stop()."}, "ans": ["a", "b"]}, {"id": "J.20", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Un fir de execuție este oprit dacă:", "opts": {"a": "Este întrerupt de alt fir concurent;", "b": "S-au executat toate acțiunile aferente lui;", "c": "Întreaga execuție a programului este oprită."}, "ans": ["a", "b", "c"]}, {"id": "J.21", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Într-un program scris în Java o constantă poate fi:", "opts": {"a": "Declarată;", "b": "Inițializată;", "c": "Asignată."}, "ans": ["a", "b"]}, {"id": "J.22", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Care din secvențele de mai jos sunt corecte:", "opts": {"a": "final int A=0;", "b": "final int A=0; x=A;", "c": "final int A=0; A=A+1;"}, "ans": ["a", "b"]}, {"id": "J.23", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Care din acțiunile de mai jos sunt semnalate ca erori la compilare:", "opts": {"a": "Asignarea unei variabile cu valoarea unei constante;", "b": "Reutilizarea unei constante în același fișier;", "c": "Adunarea unei constante la o variabilă."}, "ans": ["b"]}, {"id": "J.24", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "O constantă se poate utiliza pentru a stabili:", "opts": {"a": "Un prag de comparație;", "b": "Un număr de repetări ale unui ciclu;", "c": "O contorizare."}, "ans": ["a", "b"]}, {"id": "J.25", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Diferența între o constantă și o variabilă în Java este:", "opts": {"a": "Nici una;", "b": "Modul de inițializare;", "c": "Stabilitatea valorii."}, "ans": ["c"]}, {"id": "J.26", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Vectorii diferă față de tabele prin faptul că:", "opts": {"a": "Acceptă ca elemente doar obiectele;", "b": "Permit alocarea dinamică;", "c": "Permit introducerea și eliminarea unor elemente."}, "ans": ["a", "b", "c"]}, {"id": "J.27", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Sintaxa de declarare a unui vector este:", "opts": {"a": "Vector nume_vector = new Vector();", "b": "Vector = new Vector(nume_vector);", "c": "Vector nume_vector = new Vector(int nr_locatii)."}, "ans": ["a"]}, {"id": "J.28", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Extragerea unui obiect din vector se face cu metoda:", "opts": {"a": "final synchronized Object elementAt(Object ob);", "b": "final synchronized int indexOf(Object ob);", "c": "final synchronized Object get(Object ob)."}, "ans": ["a"]}, {"id": "J.29", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Determinarea poziției unui obiect din vector se face cu:", "opts": {"a": "final synchronized Object elementAt(Object ob);", "b": "final synchronized int indexOf(Object ob);", "c": "final synchronized Object get(Object ob)."}, "ans": ["b"]}, {"id": "J.30", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Găsirea ultimului element al unui vector se face cu:", "opts": {"a": "final synchronized Object firstElement();", "b": "final synchronized Object lastElement();", "c": "final synchronized Object finalElement()."}, "ans": ["b"]}, {"id": "J.31", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Instrucțiunea \"switch\" se recomandă pentru:", "opts": {"a": "Secvențe cu o unică condiție de test;", "b": "Secvențe cu două condiții de test;", "c": "Secvențe cu mai multe-condiții de test."}, "ans": ["c"]}, {"id": "J.32", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "În limbajul Java se poate înlocui \"if...else if\" cu:", "opts": {"a": "Instrucțiunea \"for\";", "b": "Instrucțiunea \"?:\";", "c": "Instrucțiunea \"switch\"."}, "ans": ["c"]}, {"id": "J.33", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Instrucțiunea \"for\" devine buclă infinită dacă lipsește:", "opts": {"a": "Expresia de test", "b": "Valoarea inițială a contorului;", "c": "Incrementarea contorului."}, "ans": ["a", "c"]}, {"id": "J.34", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Particula \"while\" din \"do...while\" reprezintă:", "opts": {"a": "Începutul buclei;", "b": "Punctul de test;", "c": "Sfârșitul buclei."}, "ans": ["b", "c"]}, {"id": "J.35", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Instrucțiunile \"do...while\" și \"for\" sunt:", "opts": {"a": "Instrucțiuni de control al fluxului;", "b": "Echivalente;", "c": "Ne-echivalente."}, "ans": ["a", "b"]}, {"id": "J.36", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "În limbajul Java declarația unei clase cuprinde:", "opts": {"a": "Numele clasei;", "b": "Datele membre;", "c": "Funcțiile membre."}, "ans": ["a", "b", "c"]}, {"id": "J.37", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "În limbajul Java funcțiile membre sunt:", "opts": {"a": "Declarate în interiorul clasei;", "b": "Declarate în afara clasei;", "c": "În ambele moduri."}, "ans": ["a"]}, {"id": "J.38", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Diferențele esențiale între clase și structuri sunt:", "opts": {"a": "Clasele conțin în plus date membre;", "b": "Clasele conțin în plus funcții membre;", "c": "Clasele asigură încapsularea."}, "ans": ["b", "c"]}, {"id": "J.39", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "În limbajul Java obiectele sunt:", "opts": {"a": "Alternative ale claselor;", "b": "Instanțe ale claselor;", "c": "Structuri de clase înrudite."}, "ans": ["b"]}, {"id": "J.40", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Proprietatea de încapsulare a datelor constă în faptul că într-o clasă Java:", "opts": {"a": "Se găsesc date membre și funcții membre;", "b": "Funcțiile membre sunt numai \"in line\";", "c": "Doar funcțiile membre pot accesa datele."}, "ans": ["c"]}, {"id": "J.41", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Sintaxa de utilizare a unui constructor este:", "opts": {"a": "nume_obiect = new constructor;", "b": "nume_clasa nume_obiect = new constructor;", "c": "nume_clasa nume_obiect = constructor."}, "ans": ["b"]}, {"id": "J.42", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Dintr-o clasă se instanțiază obiecte prin:", "opts": {"a": "Utilizarea metodei \"main()\";", "b": "Asignarea datelor membre ale clasei;", "c": "Utilizarea constructorului."}, "ans": ["c"]}, {"id": "J.43", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Constructorul în Java:", "opts": {"a": "Nu are tip de valoare de retur;", "b": "Poate fi implicit;", "c": "Are același nume cu clasa."}, "ans": ["a", "b", "c"]}, {"id": "J.44", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Un obiect creat de un constructor este:", "opts": {"a": "Dotat cu aceleași datele membre ca și clasa;", "b": "Dotat cu aceleași funcții membre ca și clasa;", "c": "Dotat cu elemente suplimentare față de clasă."}, "ans": ["a", "b"]}, {"id": "J.45", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Două date membre ale aceluiași obiect sunt:", "opts": {"a": "Plasate în aceiași structura de date;", "b": "Accesibile acelorași metode;", "c": "Sunt inițializate la instanțierea obiectului."}, "ans": ["a", "b", "c"]}, {"id": "J.46", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Interfețele în Java:", "opts": {"a": "Au rolul de a înlocui moștenirea multiplă;", "b": "Funcționează ca niște clase abstracte;", "c": "Conțin date abstracte."}, "ans": ["a", "b"]}, {"id": "J.47", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Sintaxa de declarare a unei interfețe este:", "opts": {"a": "nume [extends intf_par] {[date și metode]};", "b": "interface nume {[date și metode]};", "c": "interface nume [extends intf_par] {[date și metode]}."}, "ans": ["b", "c"]}, {"id": "J.48", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "O clasă poate să:", "opts": {"a": "Moștenească mai multe clase părinte;", "b": "Implementeze mai multe interfețe;", "c": "Să implementeze doar o singură interfață."}, "ans": ["b"]}, {"id": "J.49", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Sintaxa de declarare a unei interfețe moștenitor este:", "opts": {"a": "interface nume_intf [extends intf_par];", "b": "interface nume_intf {[date și metode]};", "c": "interface nume_intf [extends intf_par]{[date și metode]}."}, "ans": ["a", "b"]}, {"id": "J.50", "sec": "J", "secName": "Programare Orientată pe Obiecte (Java)", "text": "Implementarea unei interfețe de către o clasă se face cu sintaxa:", "opts": {"a": "nume_cls num_intf {[date și metode]};", "b": "class num_cls extends num_intf {[date și metode]};", "c": "class num_cls implements num_intf {[date și metode]}."}, "ans": ["c"]}, {"id": "S.1", "sec": "S", "secName": "Securitate informatică", "text": "Care algoritm se încadrează în categoria algoritmilor de cifrare polialfabetici?", "opts": {"a": "Caesar;", "b": "Viginere;", "c": "Playfair."}, "ans": ["b"]}, {"id": "S.2", "sec": "S", "secName": "Securitate informatică", "text": "Care algoritm se încadrează în categoria algoritmilor de cifrare poligramici?", "opts": {"a": "Viginere;", "b": "Polybius;", "c": "Playfair."}, "ans": ["c"]}, {"id": "S.3", "sec": "S", "secName": "Securitate informatică", "text": "Care algoritm de criptare este algoritm asimetric?", "opts": {"a": "RSA;", "b": "Diffie-Hellman;", "c": "DES;", "d": "AES."}, "ans": ["a"]}, {"id": "S.4", "sec": "S", "secName": "Securitate informatică", "text": "Algoritmul DES criptează blocuri de:", "opts": {"a": "32 biți;", "b": "64 biți;", "c": "128 biți;", "d": "16 biți."}, "ans": ["b"]}, {"id": "S.5", "sec": "S", "secName": "Securitate informatică", "text": "Algoritmul DSA (Digital Signature Algorithm) este un algoritm care:", "opts": {"a": "Folosește cheie publică;", "b": "Folosește cheie publică și cheie secretă;", "c": "Folosește cheie secretă."}, "ans": ["b"]}, {"id": "S.6", "sec": "S", "secName": "Securitate informatică", "text": "Câți algoritmi cuprind în general schemele semnăturilor digitale:", "opts": {"a": "3;", "b": "2;", "c": "1."}, "ans": ["a"]}, {"id": "S.7", "sec": "S", "secName": "Securitate informatică", "text": "AES utilizează o dimensiune a cheii de biți de ____.", "opts": {"a": "64, 128 sau 192;", "b": "192 sau 256;", "c": "128, 192 sau 256;", "d": "64 sau 256."}, "ans": ["c"]}, {"id": "S.8", "sec": "S", "secName": "Securitate informatică", "text": "Câte chei sunt necesare pentru criptarea și decriptarea datelor atunci când folosim un cifru asimetric?", "opts": {"a": "0;", "b": "1;", "c": "2;", "d": "3."}, "ans": ["c"]}, {"id": "S.9", "sec": "S", "secName": "Securitate informatică", "text": "Care din următoarele opțiuni definește corect atacul de forță brută (Brute force attack)?", "opts": {"a": "Forțând brutal utilizatorul să partajeze informații utile, cum ar fi coduri și parole;", "b": "O entitate pretinde a fi o altă entitate;", "c": "Încercarea tuturor cheilor posibile pentru a decripta mesajul;", "d": "Mesajul sau informația este modificată înainte de a le trimite către destinatar."}, "ans": ["c"]}, {"id": "S.10", "sec": "S", "secName": "Securitate informatică", "text": "O funcție hash este o funcție:", "opts": {"a": "Care primește ca intrare mesaje de dimensiune fixă din care mesajul inițial nu poate fi recuperat;", "b": "Care primește ca intrare mesaje de dimensiune fixă și returnează un mesaj de lungime fixă din care mesajul inițial poate fi recuperat;", "c": "Care primește ca intrare mesaje de dimensiune variabilă și returnează un mesaj de lungime fixă din care mesajul inițial nu poate fi recuperat."}, "ans": ["c"]}, {"id": "S.11", "sec": "S", "secName": "Securitate informatică", "text": "Ce reprezintă securitatea informației?", "opts": {"a": "Protejarea informațiilor împotriva accesului, modificării și distrugerii neautorizate;", "b": "Un proces de testare a performanței aplicațiilor;", "c": "O metodă de optimizare a rețelelor;", "d": "Un sistem de arhivare a datelor."}, "ans": ["a"]}, {"id": "S.12", "sec": "S", "secName": "Securitate informatică", "text": "Care dintre următoarele este un atac pasiv?", "opts": {"a": "Interceptarea mesajelor;", "b": "Modificarea conținutului mesajelor;", "c": "Injectarea de cod SQL;", "d": "Ransomware."}, "ans": ["a"]}, {"id": "S.13", "sec": "S", "secName": "Securitate informatică", "text": "Ce tip de atac vizează indisponibilizarea unui serviciu prin supraîncărcarea acestuia?", "opts": {"a": "Phishing;", "b": "Man-in-the-Middle;", "c": "Denial-of-Service (DoS);", "d": "Inginerie socială."}, "ans": ["c"]}, {"id": "S.14", "sec": "S", "secName": "Securitate informatică", "text": "Ce atac presupune manipularea utilizatorilor pentru a divulga informații sensibile?", "opts": {"a": "Inginerie socială;", "b": "SQL Injection;", "c": "Denial-of-Service (DoS);", "d": "Phishing."}, "ans": ["a"]}, {"id": "S.15", // ---- Persistence ----
const STORAGE_KEY = 'grile_licenta_state';

function loadPersisted(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return null;
}

function savePersisted(){
  try{
    const data = {
      completedTests: [...state.completedTests],
      history: state.history,
      darkMode: state.darkMode,
      instantFeedback: state.instantFeedback,
      sectionAttempts: state.sectionAttempts
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }catch(e){}
}

let state = {
  screen: 'home',
  darkMode: window.matchMedia('(prefers-color-scheme: dark)').matches,
  instantFeedback: true,
  quizMode: null, // 'test' or 'section'
  testIndex: null,
  sectionCode: null,
  sectionCount: 10,
  quiz: [],
  current: 0,
  answers: [],
  currentSelection: [],
  locked: false,
  completedTests: new Set(),
  history: [],
  sectionAttempts: {},
  timerStarted: null,
  timerInterval: null
};

// Restore persisted state
const saved = loadPersisted();
if(saved){
  if(saved.completedTests) state.completedTests = new Set(saved.completedTests);
  if(saved.history) state.history = saved.history;
  if(saved.darkMode !== undefined) state.darkMode = saved.darkMode;
  if(saved.instantFeedback !== undefined) state.instantFeedback = saved.instantFeedback;
  if(saved.sectionAttempts) state.sectionAttempts = saved.sectionAttempts;
}

function setTheme(){
  document.documentElement.setAttribute('data-theme', state.darkMode ? 'dark' : 'light');
  const meta = document.querySelector('meta[name=theme-color]');
  if(meta){
    meta.content = state.darkMode ? '#161B2B' : '#F2EEE2';
  }
}
setTheme();

// ---- Helpers ----
function esc(s){
  const d = document.createElement('div');
  d.innerText = s;
  return d.innerHTML;
}

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1; i>0; i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function arraysEqualAsSets(a,b){
  if(a.length !== b.length) return false;
  const sa = a.slice().sort(), sb = b.slice().sort();
  return sa.every((v,i)=>v===sb[i]);
}

function formatTime(ms){
  const s = Math.floor(ms/1000);
  const m = Math.floor(s/60);
  const sec = s%60;
  return m + ':' + (sec<10?'0':'') + sec;
}

// ---- Navigation ----
function goHome(){
  state.screen = 'home';
  if(state.timerInterval){clearInterval(state.timerInterval);state.timerInterval=null}
  render();
}

function goToTests(){
  state.screen = 'tests';
  render();
}

function goToSectionPicker(){
  state.screen = 'section-picker';
  render();
}

function goToStats(){
  state.screen = 'stats';
  render();
}

// ---- Screen rendering ----
function render(){
  const app = document.getElementById('app');
  switch(state.screen){
    case 'home': renderHome(app); break;
    case 'tests': renderTestList(app); break;
    case 'section-picker': renderSectionPicker(app); break;
    case 'quiz': renderQuiz(app); break;
    case 'results': renderResults(app); break;
    case 'stats': renderStats(app); break;
  }
}
